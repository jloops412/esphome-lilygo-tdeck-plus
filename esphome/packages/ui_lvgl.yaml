
script:
  - id: note_activity
    then:
      - lambda: |-
          uint32_t now = esphome::millis();
          if (!id(screensaver_active)) {
            // Ignore very-frequent activity pulses to prevent noisy inputs
            // from blocking auto-screensaver.
            if ((now - id(last_activity_note_ms)) < 1500) {
              return;
            }
          }
          id(last_activity_note_ms) = now;
          id(last_activity_ms) = now;
      - if:
          condition:
            lambda: "return id(screensaver_active);"
          then:
            - script.execute: wake_display

  - id: page_next
    then:
      - lvgl.page.next:
      - script.execute: lvgl_update_dynamic

  - id: page_prev
    then:
      - lvgl.page.previous:
      - script.execute: lvgl_update_dynamic

  - id: wake_display
    then:
      - lambda: |-
          uint32_t now = esphome::millis();
          id(screensaver_active) = false;
          id(last_activity_ms) = now;
          id(last_activity_note_ms) = now;
      - light.turn_on:
          id: tft_backlight
          brightness: !lambda "return id(backlight_percent) / 100.0f;"
      - lvgl.resume:
      - script.execute: lvgl_update_dynamic

  - id: sleep_display
    then:
      - lambda: |-
          id(screensaver_active) = true;
      - lvgl.pause:
          show_snow: false
      - light.turn_off: tft_backlight

  - id: saver_timeout_down
    then:
      - lambda: |-
          id(screensaver_timeout_s) -= 5;
          if (id(screensaver_timeout_s) < 10) id(screensaver_timeout_s) = 10;
      - script.execute: lvgl_update_dynamic

  - id: saver_timeout_up
    then:
      - lambda: |-
          id(screensaver_timeout_s) += 5;
          if (id(screensaver_timeout_s) > 300) id(screensaver_timeout_s) = 300;
      - script.execute: lvgl_update_dynamic

  - id: set_saver_timeout
    parameters:
      seconds: int
    then:
      - lambda: |-
          seconds = ((seconds + 2) / 5) * 5;
          if (seconds < 10) seconds = 10;
          if (seconds > 300) seconds = 300;
          id(screensaver_timeout_s) = seconds;
      - lvgl.slider.update:
          id: settings_saver_slider
          value: !lambda "return id(screensaver_timeout_s);"
      - script.execute: lvgl_update_dynamic

  - id: toggle_screensaver_enabled
    mode: restart
    then:
      - lambda: |-
          id(screensaver_enabled) = !id(screensaver_enabled);
      - script.execute: lvgl_update_dynamic

  - id: toggle_wake_touch
    then:
      - lambda: |-
          id(wake_on_touch) = !id(wake_on_touch);
      - script.execute: lvgl_update_dynamic

  - id: toggle_wake_keyboard
    then:
      - lambda: |-
          id(wake_on_keyboard) = !id(wake_on_keyboard);
      - script.execute: lvgl_update_dynamic

  - id: toggle_wake_trackball
    then:
      - lambda: |-
          id(wake_on_trackball) = !id(wake_on_trackball);
      - script.execute: lvgl_update_dynamic

  - id: toggle_touch_debug
    then:
      - lambda: |-
          id(touch_debug) = !id(touch_debug);
      - script.execute: lvgl_update_dynamic

  - id: start_touch_calibration
    then:
      - lambda: |-
          id(touch_cal_mode) = true;
          id(touch_cal_review_pending) = false;
          id(touch_cal_step) = 0;
          id(touch_active) = false;
          id(touch_cal_candidate_x_min) = 0;
          id(touch_cal_candidate_x_max) = 0;
          id(touch_cal_candidate_y_min) = 0;
          id(touch_cal_candidate_y_max) = 0;
          id(cal_raw_tl_x) = 0; id(cal_raw_tl_y) = 0;
          id(cal_raw_tr_x) = 0; id(cal_raw_tr_y) = 0;
          id(cal_raw_bl_x) = 0; id(cal_raw_bl_y) = 0;
          id(cal_raw_br_x) = 0; id(cal_raw_br_y) = 0;
          id(cal9_raw_tl_x) = 0; id(cal9_raw_tl_y) = 0;
          id(cal9_raw_tc_x) = 0; id(cal9_raw_tc_y) = 0;
          id(cal9_raw_tr_x) = 0; id(cal9_raw_tr_y) = 0;
          id(cal9_raw_ml_x) = 0; id(cal9_raw_ml_y) = 0;
          id(cal9_raw_mc_x) = 0; id(cal9_raw_mc_y) = 0;
          id(cal9_raw_mr_x) = 0; id(cal9_raw_mr_y) = 0;
          id(cal9_raw_bl_x) = 0; id(cal9_raw_bl_y) = 0;
          id(cal9_raw_bc_x) = 0; id(cal9_raw_bc_y) = 0;
          id(cal9_raw_br_x) = 0; id(cal9_raw_br_y) = 0;
      - lvgl.page.show: touch_cal_page
      - script.execute: lvgl_update_dynamic

  - id: reset_touch_calibration
    then:
      - lambda: |-
          id(cal_dx_tl) = 0; id(cal_dy_tl) = 0;
          id(cal_dx_tc) = 0; id(cal_dy_tc) = 0;
          id(cal_dx_tr) = 0; id(cal_dy_tr) = 0;
          id(cal_dx_ml) = 0; id(cal_dy_ml) = 0;
          id(cal_dx_mc) = 0; id(cal_dy_mc) = 0;
          id(cal_dx_mr) = 0; id(cal_dy_mr) = 0;
          id(cal_dx_bl) = 0; id(cal_dy_bl) = 0;
          id(cal_dx_bc) = 0; id(cal_dy_bc) = 0;
          id(cal_dx_br) = 0; id(cal_dy_br) = 0;
          id(cal_raw_tl_x) = 0; id(cal_raw_tl_y) = 0;
          id(cal_raw_tr_x) = 0; id(cal_raw_tr_y) = 0;
          id(cal_raw_bl_x) = 0; id(cal_raw_bl_y) = 0;
          id(cal_raw_br_x) = 0; id(cal_raw_br_y) = 0;
          id(cal9_raw_tl_x) = 0; id(cal9_raw_tl_y) = 0;
          id(cal9_raw_tc_x) = 0; id(cal9_raw_tc_y) = 0;
          id(cal9_raw_tr_x) = 0; id(cal9_raw_tr_y) = 0;
          id(cal9_raw_ml_x) = 0; id(cal9_raw_ml_y) = 0;
          id(cal9_raw_mc_x) = 0; id(cal9_raw_mc_y) = 0;
          id(cal9_raw_mr_x) = 0; id(cal9_raw_mr_y) = 0;
          id(cal9_raw_bl_x) = 0; id(cal9_raw_bl_y) = 0;
          id(cal9_raw_bc_x) = 0; id(cal9_raw_bc_y) = 0;
          id(cal9_raw_br_x) = 0; id(cal9_raw_br_y) = 0;
          id(touch_cal_candidate_x_min) = 0;
          id(touch_cal_candidate_x_max) = 0;
          id(touch_cal_candidate_y_min) = 0;
          id(touch_cal_candidate_y_max) = 0;
          id(touch_cal_mode) = false;
          id(touch_cal_review_pending) = false;
          id(touch_cal_step) = 0;
      - lambda: |-
          id(touch_cal_suggest_x_min) = atoi("${touch_x_min}");
          id(touch_cal_suggest_x_max) = atoi("${touch_x_max}");
          id(touch_cal_suggest_y_min) = atoi("${touch_y_min}");
          id(touch_cal_suggest_y_max) = atoi("${touch_y_max}");
      - script.execute: touch_cal_apply_stored
      - script.execute: lvgl_update_dynamic

  - id: touch_cal_save
    then:
      - if:
          condition:
            lambda: "return id(touch_cal_review_pending);"
          then:
            - lambda: |-
                id(touch_cal_suggest_x_min) = id(touch_cal_candidate_x_min);
                id(touch_cal_suggest_x_max) = id(touch_cal_candidate_x_max);
                id(touch_cal_suggest_y_min) = id(touch_cal_candidate_y_min);
                id(touch_cal_suggest_y_max) = id(touch_cal_candidate_y_max);
                id(touch_cal_review_pending) = false;
            - script.execute: touch_cal_apply_stored
            - lvgl.page.show: settings_page
      - script.execute: lvgl_update_dynamic

  - id: touch_cal_retry
    then:
      - script.execute: start_touch_calibration

  - id: touch_cal_apply_stored
    then:
      - lambda: |-
          if (id(touch_cal_suggest_x_max) > id(touch_cal_suggest_x_min) &&
              id(touch_cal_suggest_y_max) > id(touch_cal_suggest_y_min)) {
            id(tdeck_touch).set_calibration(
              id(touch_cal_suggest_x_min),
              id(touch_cal_suggest_x_max),
              id(touch_cal_suggest_y_min),
              id(touch_cal_suggest_y_max)
            );
            ESP_LOGI("touch_cal", "Using persisted calibration x_min=%d x_max=%d y_min=%d y_max=%d",
                     id(touch_cal_suggest_x_min),
                     id(touch_cal_suggest_x_max),
                     id(touch_cal_suggest_y_min),
                     id(touch_cal_suggest_y_max));
          }

  - id: select_light
    parameters:
      idx: int
    then:
      - lambda: |-
          int slot_count = atoi("${light_slot_count}");
          if (slot_count < 1) slot_count = 1;
          if (slot_count > 8) slot_count = 8;
          if (idx < 0) idx = 0;
          if (idx >= slot_count) return;
          id(selected_light) = idx;
      - script.execute: resolve_selected_light_target
      - script.execute: lvgl_update_dynamic

  - id: display_backlight_down
    then:
      - lambda: |-
          id(backlight_percent) -= 10;
          if (id(backlight_percent) < 10) id(backlight_percent) = 10;
      - light.turn_on:
          id: tft_backlight
          brightness: !lambda "return id(backlight_percent) / 100.0f;"
      - script.execute: lvgl_update_dynamic

  - id: display_backlight_up
    then:
      - lambda: |-
          id(backlight_percent) += 10;
          if (id(backlight_percent) > 100) id(backlight_percent) = 100;
      - light.turn_on:
          id: tft_backlight
          brightness: !lambda "return id(backlight_percent) / 100.0f;"
      - script.execute: lvgl_update_dynamic

  - id: set_display_backlight
    parameters:
      pct: int
    then:
      - lambda: |-
          pct = ((pct + 2) / 5) * 5;
          if (pct < 10) pct = 10;
          if (pct > 100) pct = 100;
          id(backlight_percent) = pct;
      - light.turn_on:
          id: tft_backlight
          brightness: !lambda "return id(backlight_percent) / 100.0f;"
      - lvgl.slider.update:
          id: display_brightness_slider
          value: !lambda "return id(backlight_percent);"
      - script.execute: lvgl_update_dynamic

  - id: selected_light_prev
    then:
      - lambda: |-
          int slot_count = atoi("${light_slot_count}");
          if (slot_count < 1) slot_count = 1;
          if (slot_count > 8) slot_count = 8;
          id(selected_light) = (id(selected_light) + slot_count - 1) % slot_count;
      - script.execute: resolve_selected_light_target
      - script.execute: lvgl_update_dynamic

  - id: selected_light_next
    then:
      - lambda: |-
          int slot_count = atoi("${light_slot_count}");
          if (slot_count < 1) slot_count = 1;
          if (slot_count > 8) slot_count = 8;
          id(selected_light) = (id(selected_light) + 1) % slot_count;
      - script.execute: resolve_selected_light_target
      - script.execute: lvgl_update_dynamic

  - id: resolve_selected_light_target
    then:
      - lambda: |-
          int slot_count = atoi("${light_slot_count}");
          if (slot_count < 1) slot_count = 1;
          if (slot_count > 8) slot_count = 8;
          if (id(selected_light) < 0) id(selected_light) = 0;
          if (id(selected_light) >= slot_count) id(selected_light) = slot_count - 1;

          if (id(selected_light) == 0) {
            id(selected_light_name) = "${light_slot_1_name}";
            id(selected_light_entity) = "${light_slot_1_entity}";
          } else if (id(selected_light) == 1) {
            id(selected_light_name) = "${light_slot_2_name}";
            id(selected_light_entity) = "${light_slot_2_entity}";
          } else if (id(selected_light) == 2) {
            id(selected_light_name) = "${light_slot_3_name}";
            id(selected_light_entity) = "${light_slot_3_entity}";
          } else if (id(selected_light) == 3) {
            id(selected_light_name) = "${light_slot_4_name}";
            id(selected_light_entity) = "${light_slot_4_entity}";
          } else if (id(selected_light) == 4) {
            id(selected_light_name) = "${light_slot_5_name}";
            id(selected_light_entity) = "${light_slot_5_entity}";
          } else if (id(selected_light) == 5) {
            id(selected_light_name) = "${light_slot_6_name}";
            id(selected_light_entity) = "${light_slot_6_entity}";
          } else if (id(selected_light) == 6) {
            id(selected_light_name) = "${light_slot_7_name}";
            id(selected_light_entity) = "${light_slot_7_entity}";
          } else {
            id(selected_light_name) = "${light_slot_8_name}";
            id(selected_light_entity) = "${light_slot_8_entity}";
          }

  - id: selected_light_toggle
    mode: restart
    then:
      - homeassistant.action:
          action: light.toggle
          data:
            entity_id: !lambda "return id(selected_light_entity);"
      - lambda: |-
          id(lights_dirty) = true;
      - script.execute: lvgl_update_dynamic

  - id: selected_light_turn_on
    mode: restart
    then:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: !lambda "return id(selected_light_entity);"
      - lambda: |-
          id(lights_dirty) = true;
      - script.execute: lvgl_update_dynamic

  - id: selected_light_turn_off
    mode: restart
    then:
      - homeassistant.action:
          action: light.turn_off
          data:
            entity_id: !lambda "return id(selected_light_entity);"
      - lambda: |-
          id(lights_dirty) = true;
      - script.execute: lvgl_update_dynamic

  - id: selected_light_brighter
    then:
      - script.execute:
          id: selected_light_set_brightness_pct
          pct: !lambda "return id(selected_light_brightness_pct) + 10;"

  - id: selected_light_dimmer
    then:
      - script.execute:
          id: selected_light_set_brightness_pct
          pct: !lambda "return id(selected_light_brightness_pct) - 10;"

  - id: selected_light_set_brightness_pct
    mode: restart
    parameters:
      pct: int
    then:
      - script.execute:
          id: selected_light_set_brightness_local
          pct: !lambda "return pct;"
      - script.execute: selected_light_commit_brightness
      - script.execute: lvgl_update_dynamic

  - id: selected_light_set_brightness_local
    mode: restart
    parameters:
      pct: int
    then:
      - lambda: |-
          pct = ((pct + 5) / 10) * 10;
          if (pct < 1) pct = 1;
          if (pct > 100) pct = 100;
          id(selected_light_brightness_pct) = pct;

  - id: selected_light_commit_brightness
    mode: restart
    then:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: !lambda "return id(selected_light_entity);"
            brightness_pct: !lambda "return id(selected_light_brightness_pct);"
      - lambda: |-
          id(lights_dirty) = true;

  - id: selected_light_warm
    mode: restart
    then:
      - script.execute:
          id: selected_light_set_kelvin
          kelvin: 2700

  - id: selected_light_cool
    mode: restart
    then:
      - script.execute:
          id: selected_light_set_kelvin
          kelvin: 6500

  - id: selected_light_color
    mode: restart
    parameters:
      cname: string
    then:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: !lambda "return id(selected_light_entity);"
            color_name: !lambda "return cname;"
      - lambda: |-
          id(lights_dirty) = true;
      - script.execute: lvgl_update_dynamic

  - id: set_light_color_index
    parameters:
      idx: int
    then:
      - lambda: |-
          if (idx < 0) idx = 0;
          if (idx > 11) idx = 11;
          id(light_color_index) = idx;
      - script.execute: refresh_light_color_meta

  - id: apply_light_color_index
    mode: restart
    then:
      - if:
          condition:
            lambda: "return id(light_color_index) == 0;"
          then:
            - script.execute: selected_light_warm
      - if:
          condition:
            lambda: "return id(light_color_index) == 1;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "white"
      - if:
          condition:
            lambda: "return id(light_color_index) == 2;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "amber"
      - if:
          condition:
            lambda: "return id(light_color_index) == 3;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "orange"
      - if:
          condition:
            lambda: "return id(light_color_index) == 4;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "yellow"
      - if:
          condition:
            lambda: "return id(light_color_index) == 5;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "green"
      - if:
          condition:
            lambda: "return id(light_color_index) == 6;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "cyan"
      - if:
          condition:
            lambda: "return id(light_color_index) == 7;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "blue"
      - if:
          condition:
            lambda: "return id(light_color_index) == 8;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "purple"
      - if:
          condition:
            lambda: "return id(light_color_index) == 9;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "magenta"
      - if:
          condition:
            lambda: "return id(light_color_index) == 10;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "red"
      - if:
          condition:
            lambda: "return id(light_color_index) == 11;"
          then:
            - script.execute: selected_light_cool

  - id: refresh_light_color_meta
    then:
      - lvgl.widget.update:
          id: light_color_selector_ring
          x: !lambda |-
            int col = id(light_color_index) % 4;
            return 16 + (col * 42);
          y: !lambda |-
            int row = id(light_color_index) / 4;
            return 90 + (row * 36);
      - lvgl.label.update:
          id: light_color_preview_lbl
          text: !lambda |-
            if (id(light_color_index) == 0) return std::string("Warm White");
            if (id(light_color_index) == 1) return std::string("Neutral White");
            if (id(light_color_index) == 2) return std::string("Amber");
            if (id(light_color_index) == 3) return std::string("Orange");
            if (id(light_color_index) == 4) return std::string("Yellow");
            if (id(light_color_index) == 5) return std::string("Green");
            if (id(light_color_index) == 6) return std::string("Cyan");
            if (id(light_color_index) == 7) return std::string("Blue");
            if (id(light_color_index) == 8) return std::string("Purple");
            if (id(light_color_index) == 9) return std::string("Magenta");
            if (id(light_color_index) == 10) return std::string("Red");
            return std::string("Cool White");

  - id: all_lights_off
    mode: restart
    then:
      - if:
          condition:
            lambda: "return atoi(\"${light_slot_count}\") >= 1;"
          then:
            - homeassistant.action:
                action: light.turn_off
                data:
                  entity_id: ${light_slot_1_entity}
      - if:
          condition:
            lambda: "return atoi(\"${light_slot_count}\") >= 2;"
          then:
            - homeassistant.action:
                action: light.turn_off
                data:
                  entity_id: ${light_slot_2_entity}
      - if:
          condition:
            lambda: "return atoi(\"${light_slot_count}\") >= 3;"
          then:
            - homeassistant.action:
                action: light.turn_off
                data:
                  entity_id: ${light_slot_3_entity}
      - if:
          condition:
            lambda: "return atoi(\"${light_slot_count}\") >= 4;"
          then:
            - homeassistant.action:
                action: light.turn_off
                data:
                  entity_id: ${light_slot_4_entity}
      - if:
          condition:
            lambda: "return atoi(\"${light_slot_count}\") >= 5;"
          then:
            - homeassistant.action:
                action: light.turn_off
                data:
                  entity_id: ${light_slot_5_entity}
      - if:
          condition:
            lambda: "return atoi(\"${light_slot_count}\") >= 6;"
          then:
            - homeassistant.action:
                action: light.turn_off
                data:
                  entity_id: ${light_slot_6_entity}
      - if:
          condition:
            lambda: "return atoi(\"${light_slot_count}\") >= 7;"
          then:
            - homeassistant.action:
                action: light.turn_off
                data:
                  entity_id: ${light_slot_7_entity}
      - if:
          condition:
            lambda: "return atoi(\"${light_slot_count}\") >= 8;"
          then:
            - homeassistant.action:
                action: light.turn_off
                data:
                  entity_id: ${light_slot_8_entity}
      - lambda: |-
          id(lights_dirty) = true;
      - script.execute: lvgl_update_dynamic

  - id: theme_prev
    mode: restart
    then:
      - lambda: |-
          id(theme_token_index) = (id(theme_token_index) + 8) % 9;
          id(theme_index) = id(theme_token_index) % 7;
      - script.execute: theme_sync_editor_from_token
      - script.execute: lvgl_update_labels

  - id: theme_next
    mode: restart
    then:
      - lambda: |-
          id(theme_token_index) = (id(theme_token_index) + 1) % 9;
          id(theme_index) = id(theme_token_index) % 7;
      - script.execute: theme_sync_editor_from_token
      - script.execute: lvgl_update_labels

  - id: theme_accent_set
    mode: restart
    parameters:
      idx: int
    then:
      - lambda: |-
          if (idx < 0) idx = 0;
          if (idx > 4) idx = 4;
          id(theme_accent_index) = idx;
          if (idx == 0) {
            id(theme_token_action_soft) = 0x4A7CD6;
          } else if (idx == 1) {
            id(theme_token_action_soft) = 0x56A66C;
          } else if (idx == 2) {
            id(theme_token_action_soft) = 0xC48B3D;
          } else if (idx == 3) {
            id(theme_token_action_soft) = 0xB66F8E;
          } else {
            id(theme_token_action_soft) = 0x8F979F;
          }
      - script.execute: theme_apply_tokens

  - id: theme_accent_next
    mode: restart
    then:
      - lambda: |-
          id(theme_accent_index) = (id(theme_accent_index) + 1) % 5;
      - script.execute:
          id: theme_accent_set
          idx: !lambda "return id(theme_accent_index);"

  - id: theme_icon_mode_toggle
    mode: restart
    then:
      - lambda: |-
          id(theme_icon_mode) = (id(theme_icon_mode) + 1) % 2;
      - script.execute: apply_theme_icon
      - script.execute: lvgl_update_labels

  - id: set_theme_border_width
    mode: restart
    parameters:
      val: int
    then:
      - lambda: |-
          if (val < 1) val = 1;
          if (val > 4) val = 4;
          id(theme_border_width) = val;
      - script.execute: apply_theme_shape
      - script.execute: lvgl_update_labels

  - id: set_theme_radius
    mode: restart
    parameters:
      val: int
    then:
      - lambda: |-
          if (val < 4) val = 4;
          if (val > 16) val = 16;
          id(theme_radius) = val;
      - script.execute: apply_theme_shape
      - script.execute: lvgl_update_labels

  - id: theme_select_token
    mode: restart
    parameters:
      idx: int
    then:
      - lambda: |-
          if (idx < 0) idx = 0;
          if (idx > 8) idx = 8;
          id(theme_token_index) = idx;
      - script.execute: theme_sync_editor_from_token
      - script.execute: lvgl_update_labels

  - id: theme_sync_editor_from_token
    mode: restart
    then:
      - lambda: |-
          int color = id(theme_token_screen_bg);
          switch (id(theme_token_index)) {
            case 0: color = id(theme_token_screen_bg); break;
            case 1: color = id(theme_token_surface); break;
            case 2: color = id(theme_token_surface_alt); break;
            case 3: color = id(theme_token_action); break;
            case 4: color = id(theme_token_action_soft); break;
            case 5: color = id(theme_token_text_primary); break;
            case 6: color = id(theme_token_text_dim); break;
            case 7: color = id(theme_token_ok); break;
            default: color = id(theme_token_warn); break;
          }
          id(theme_ui_sync_in_progress) = true;
          id(theme_edit_r) = (color >> 16) & 0xFF;
          id(theme_edit_g) = (color >> 8) & 0xFF;
          id(theme_edit_b) = color & 0xFF;
      - lvgl.slider.update:
          id: theme_r_slider
          value: !lambda "return id(theme_edit_r);"
      - lvgl.slider.update:
          id: theme_g_slider
          value: !lambda "return id(theme_edit_g);"
      - lvgl.slider.update:
          id: theme_b_slider
          value: !lambda "return id(theme_edit_b);"
      - lambda: |-
          id(theme_ui_sync_in_progress) = false;
      - script.execute: theme_update_hex_and_preview

  - id: theme_editor_set_rgb
    mode: restart
    parameters:
      channel: int
      val: int
    then:
      - if:
          condition:
            lambda: "return !id(theme_ui_sync_in_progress);"
          then:
            - lambda: |-
                if (val < 0) val = 0;
                if (val > 255) val = 255;
                if (channel == 0) id(theme_edit_r) = val;
                else if (channel == 1) id(theme_edit_g) = val;
                else id(theme_edit_b) = val;
            - script.execute: theme_update_hex_and_preview

  - id: theme_editor_step_rgb
    mode: restart
    parameters:
      channel: int
      delta: int
    then:
      - lambda: |-
          int v = 0;
          if (channel == 0) v = id(theme_edit_r);
          else if (channel == 1) v = id(theme_edit_g);
          else v = id(theme_edit_b);
          v += delta;
          if (v < 0) v = 0;
          if (v > 255) v = 255;
          if (channel == 0) id(theme_edit_r) = v;
          else if (channel == 1) id(theme_edit_g) = v;
          else id(theme_edit_b) = v;
      - lvgl.slider.update:
          id: theme_r_slider
          value: !lambda "return id(theme_edit_r);"
      - lvgl.slider.update:
          id: theme_g_slider
          value: !lambda "return id(theme_edit_g);"
      - lvgl.slider.update:
          id: theme_b_slider
          value: !lambda "return id(theme_edit_b);"
      - script.execute: theme_update_hex_and_preview

  - id: theme_editor_apply_to_token
    mode: restart
    then:
      - lambda: |-
          int color = ((id(theme_edit_r) & 0xFF) << 16) |
                      ((id(theme_edit_g) & 0xFF) << 8) |
                      (id(theme_edit_b) & 0xFF);
          switch (id(theme_token_index)) {
            case 0: id(theme_token_screen_bg) = color; break;
            case 1: id(theme_token_surface) = color; break;
            case 2: id(theme_token_surface_alt) = color; break;
            case 3: id(theme_token_action) = color; break;
            case 4: id(theme_token_action_soft) = color; break;
            case 5: id(theme_token_text_primary) = color; break;
            case 6: id(theme_token_text_dim) = color; break;
            case 7: id(theme_token_ok) = color; break;
            default: id(theme_token_warn) = color; break;
          }
      - script.execute: theme_apply_tokens
      - script.execute: theme_sync_editor_from_token
      - script.execute: lvgl_update_labels

  - id: theme_editor_revert_token
    mode: restart
    then:
      - script.execute: theme_sync_editor_from_token
      - script.execute: lvgl_update_labels

  - id: theme_update_hex_and_preview
    mode: restart
    then:
      - lambda: |-
          if (id(theme_edit_r) < 0) id(theme_edit_r) = 0;
          if (id(theme_edit_r) > 255) id(theme_edit_r) = 255;
          if (id(theme_edit_g) < 0) id(theme_edit_g) = 0;
          if (id(theme_edit_g) > 255) id(theme_edit_g) = 255;
          if (id(theme_edit_b) < 0) id(theme_edit_b) = 0;
          if (id(theme_edit_b) > 255) id(theme_edit_b) = 255;
          char hex_buf[16];
          char prev_buf[48];
          snprintf(hex_buf, sizeof(hex_buf), "#%02X%02X%02X", id(theme_edit_r), id(theme_edit_g), id(theme_edit_b));
          snprintf(prev_buf, sizeof(prev_buf), "RGB %d / %d / %d", id(theme_edit_r), id(theme_edit_g), id(theme_edit_b));
          id(theme_hex_text) = std::string(hex_buf);
          id(theme_preview_text) = std::string(prev_buf);
      - lvgl.label.update:
          id: theme_hex_lbl
          text: !lambda "return id(theme_hex_text);"
      - lvgl.label.update:
          id: theme_preview_lbl
          text: !lambda "return id(theme_preview_text);"
      - lvgl.style.update:
          id: lv_style_theme_preview
          bg_color: !lambda "return lv_color_hex((uint32_t)(((id(theme_edit_r) & 0xFF) << 16) | ((id(theme_edit_g) & 0xFF) << 8) | (id(theme_edit_b) & 0xFF)));"
          border_color: !lambda "return lv_color_hex((uint32_t) id(theme_token_action_soft));"

  - id: theme_apply_tokens
    mode: restart
    then:
      - lvgl.style.update:
