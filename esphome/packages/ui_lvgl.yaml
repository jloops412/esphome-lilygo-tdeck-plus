  - id: climate_update_labels
    mode: restart
    then:
      - script.execute: climate_resolve_mode
      - lambda: |-
          uint32_t since_commit = esphome::millis() - id(climate_last_commit_ms);
          uint32_t guard_ms = (uint32_t) atoi("${climate_resync_guard_ms}");
          if (guard_ms < 1000U) guard_ms = 1000U;
          if (!id(climate_ui_dirty) && !id(climate_commit_pending) && !id(climate_ack_pending) && !id(climate_out_of_sync) && since_commit > guard_ms) {
            bool app_metric = id(app_units_mode) == 1;
            bool native_metric = false;
            if (id(sensi_climate_temperature_unit).has_state()) {
              std::string tu = id(sensi_climate_temperature_unit).state;
              native_metric = (tu.find("C") != std::string::npos || tu.find("c") != std::string::npos);
            }
            auto native_to_app = [&](float v) -> int {
              if (!(v == v)) return 0;
              if (app_metric && !native_metric) v = (v - 32.0f) * (5.0f / 9.0f);
              else if (!app_metric && native_metric) v = (v * (9.0f / 5.0f)) + 32.0f;
              return (int) (v + (v >= 0.0f ? 0.5f : -0.5f));
            };
            if (id(sensi_climate_target_temp_low).state == id(sensi_climate_target_temp_low).state) {
              id(climate_ui_target_heat_f) = native_to_app(id(sensi_climate_target_temp_low).state);
            } else if (id(sensi_auto_heat_temp).state == id(sensi_auto_heat_temp).state) {
              id(climate_ui_target_heat_f) = native_to_app(id(sensi_auto_heat_temp).state);
            }
            if (id(sensi_climate_target_temp_high).state == id(sensi_climate_target_temp_high).state) {
              id(climate_ui_target_cool_f) = native_to_app(id(sensi_climate_target_temp_high).state);
            } else if (id(sensi_auto_cool_temp).state == id(sensi_auto_cool_temp).state) {
              id(climate_ui_target_cool_f) = native_to_app(id(sensi_auto_cool_temp).state);
            }
            std::string mode = id(climate_mode_effective);
            if (mode == "heat") id(climate_ui_target_single_f) = id(climate_ui_target_heat_f);
            else if (mode == "cool") id(climate_ui_target_single_f) = id(climate_ui_target_cool_f);
            else if (mode == "auto" || mode == "heat_cool" || mode == "heat-cool") {
              id(climate_ui_target_single_f) = (id(climate_ui_target_heat_f) + id(climate_ui_target_cool_f)) / 2;
            }
          }
      - script.execute: climate_ui_clamp_targets
      - lvgl.label.update:
          id: climate_mode_chip_lbl
          text: !lambda |-
            std::string mode = id(climate_mode_effective).empty() ? std::string("-") : id(climate_mode_effective);
            return std::string("Mode: ") + mode;
      - lvgl.label.update:
          id: climate_action_chip_lbl
          text: !lambda |-
            std::string action = id(sensi_climate_hvac_action).has_state() ? id(sensi_climate_hvac_action).state : std::string("-");
            return std::string("Act: ") + action;
      - lvgl.label.update:
          id: climate_fan_chip_lbl
          text: !lambda |-
            std::string fan = id(sensi_climate_fan_mode).has_state() ? id(sensi_climate_fan_mode).state : std::string("-");
            return std::string("Fan: ") + fan;
      - lvgl.label.update:
          id: climate_indoor_lbl
          text: !lambda |-
            char buf[128];
            float t = id(sensi_temperature).state;
            if (!(t == t)) t = id(sensi_climate_current_temperature).state;
            float h = id(sensi_humidity).state;
            bool app_metric = id(app_units_mode) == 1;
            bool native_metric = false;
            if (id(sensi_climate_temperature_unit).has_state()) {
              std::string tu = id(sensi_climate_temperature_unit).state;
              native_metric = (tu.find("C") != std::string::npos || tu.find("c") != std::string::npos);
            }
            if (t == t) {
              if (app_metric && !native_metric) t = (t - 32.0f) * (5.0f / 9.0f);
              else if (!app_metric && native_metric) t = (t * (9.0f / 5.0f)) + 32.0f;
            }
            if (t != t) t = 0;
            if (h != h) h = 0;
            snprintf(buf, sizeof(buf), "Indoor %.1f %s    Humidity %.0f%%", t, app_metric ? "C" : "F", h);
            return std::string(buf);
      - lvgl.label.update:
          id: climate_mode_off_lbl
          text: !lambda |-
            bool active = id(climate_mode_effective) == "off";
            return active ? std::string("[Off]") : std::string("Off");
      - lvgl.label.update:
          id: climate_mode_heat_lbl
          text: !lambda |-
            bool active = id(climate_mode_effective) == "heat";
            return active ? std::string("[Heat]") : std::string("Heat");
      - lvgl.label.update:
          id: climate_mode_cool_lbl
          text: !lambda |-
            bool active = id(climate_mode_effective) == "cool";
            return active ? std::string("[Cool]") : std::string("Cool");
      - lvgl.label.update:
          id: climate_mode_auto_lbl
          text: !lambda |-
            std::string m = id(climate_mode_effective);
            bool active = (m == "auto" || m == "heat_cool" || m == "heat-cool");
            return active ? std::string("[Auto]") : std::string("Auto");
      - lvgl.label.update:
          id: climate_single_lbl
          text: !lambda |-
            char buf[64];
            const char *mode_name = "Target";
            std::string m = id(climate_mode_effective);
            if (m == "heat") mode_name = "Heat";
            else if (m == "cool") mode_name = "Cool";
            snprintf(buf, sizeof(buf), "%s %d %s", mode_name, id(climate_ui_target_single_f), id(app_units_mode) == 1 ? "C" : "F");
            return std::string(buf);
      - lvgl.label.update:
          id: climate_auto_heat_lbl
          text: !lambda |-
            char buf[32];
            snprintf(buf, sizeof(buf), "Heat %d %s", id(climate_ui_target_heat_f), id(app_units_mode) == 1 ? "C" : "F");
            return std::string(buf);
      - lvgl.label.update:
          id: climate_auto_cool_lbl
          text: !lambda |-
            char buf[32];
            snprintf(buf, sizeof(buf), "Cool %d %s", id(climate_ui_target_cool_f), id(app_units_mode) == 1 ? "C" : "F");
            return std::string(buf);
      - lvgl.label.update:
          id: climate_aux_btn_lbl
          text: !lambda "return id(sensi_aux_heat_state).state ? std::string(\"Aux ON\") : std::string(\"Aux OFF\");"
      - lvgl.label.update:
          id: climate_hum_offset_lbl
          text: !lambda |-
            char buf[48];
            int v = id(sensi_humidity_offset).state == id(sensi_humidity_offset).state ? (int) id(sensi_humidity_offset).state : 0;
            snprintf(buf, sizeof(buf), "Humidity Offset  %d", v);
            return std::string(buf);
      - lvgl.label.update:
          id: climate_temp_offset_lbl
          text: !lambda |-
            char buf[48];
            int v = id(sensi_temperature_offset).state == id(sensi_temperature_offset).state ? (int) id(sensi_temperature_offset).state : 0;
            snprintf(buf, sizeof(buf), "Temp Offset      %d", v);
            return std::string(buf);
      - lvgl.label.update:
          id: climate_tools_status_lbl
          text: !lambda |-
            char buf[200];
            snprintf(buf, sizeof(buf), "Aux %s  HumDisp %s  TimeDisp %s  FanSup %s  Humid %s  Lock %s",
                     id(sensi_aux_heat_state).state ? "ON" : "OFF",
                     id(sensi_display_humidity_state).state ? "ON" : "OFF",
                     id(sensi_display_time_state).state ? "ON" : "OFF",
                     id(sensi_fan_support_state).state ? "ON" : "OFF",
                     id(sensi_humidification_state).state ? "ON" : "OFF",
                     id(sensi_keypad_lockout_state).state ? "ON" : "OFF");
            return std::string(buf);
      - lvgl.label.update:
          id: climate_diag_lbl
          text: !lambda |-
            char buf[220];
            uint32_t age = (esphome::millis() - id(climate_last_commit_ms)) / 1000U;
            snprintf(buf, sizeof(buf), "Commit %lus  pend %s ack %s sync %s  Band %d%s",
                     (unsigned long) age,
                     id(climate_commit_pending) ? "YES" : "NO",
                     id(climate_ack_pending) ? "YES" : "NO",
                     id(climate_out_of_sync) ? "OUT" : "OK",
                     id(climate_ui_target_cool_f) - id(climate_ui_target_heat_f),
                     id(app_units_mode) == 1 ? "C" : "F");
            return std::string(buf);

