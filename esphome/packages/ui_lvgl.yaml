            int dr = tr - sr; if (dr < 0) dr = -dr;
            int dg = tg - sg; if (dg < 0) dg = -dg;
            int db = tb - sb; if (db < 0) db = -db;
            int score = dr + dg + db;
            if (score < best_score) {
              best_score = score;
              best_idx = i;
            }
          }
          id(theme_swatch_index) = best_idx;
          id(theme_swatch_page) = best_idx / 24;
