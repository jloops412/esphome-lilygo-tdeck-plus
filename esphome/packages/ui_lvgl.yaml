  - id: weather_update_labels
    mode: restart
    then:
      - lambda: |-
          auto c_to_disp = [&](float c) -> float {
            if (c <= -9000.0f) return c;
            if (id(app_units_mode) == 1) return c;
            return (c * (9.0f / 5.0f)) + 32.0f;
          };
          auto mps_to_disp = [&](float mps) -> float {
            if (mps <= -9000.0f) return mps;
            if (id(app_units_mode) == 1) return mps * 3.6f;
            return mps * 2.23694f;
          };
          auto hpa_to_disp = [&](float hpa) -> float {
            if (hpa <= -9000.0f) return hpa;
            if (id(app_units_mode) == 1) return hpa;
            return hpa / 68.9476f;
          };
          auto m_to_disp = [&](float m) -> float {
            if (m <= -9000.0f) return m;
            if (id(app_units_mode) == 1) return m / 1000.0f;
            return m / 0.3048f;
          };
          auto mmh_to_disp = [&](float mmh) -> float {
            if (mmh <= -9000.0f) return mmh;
            if (id(app_units_mode) == 1) return mmh;
            return mmh / 25.4f;
          };

          float t = c_to_disp(id(wx_norm_temp_c));
          float feels = c_to_disp(id(wx_norm_feels_c));
          float dew = c_to_disp(id(wx_norm_dew_c));
          float high = c_to_disp(id(wx_norm_high_c));
          float low = c_to_disp(id(wx_norm_low_c));
          float hum = id(wx_norm_humidity_pct);
          float cloud = id(wx_norm_cloud_pct);
          float uv = id(wx_norm_uv);
          float wind = mps_to_disp(id(wx_norm_wind_mps));
          float gust = mps_to_disp(id(wx_norm_wind_gust_mps));
          float dir = id(wx_norm_wind_dir_deg);
          float press = hpa_to_disp(id(wx_norm_pressure_hpa));
          float vis = m_to_disp(id(wx_norm_visibility_m));
          float rain = mmh_to_disp(id(wx_norm_rain_mm_h));
          float snow = mmh_to_disp(id(wx_norm_snow_mm_h));

          char temp_unit[4];
          char wind_unit[8];
          char press_unit[6];
          char vis_unit[4];
          char precip_unit[8];
          if (id(app_units_mode) == 1) {
            snprintf(temp_unit, sizeof(temp_unit), "C");
            snprintf(wind_unit, sizeof(wind_unit), "km/h");
            snprintf(press_unit, sizeof(press_unit), "hPa");
            snprintf(vis_unit, sizeof(vis_unit), "km");
            snprintf(precip_unit, sizeof(precip_unit), "mm/h");
          } else {
            snprintf(temp_unit, sizeof(temp_unit), "F");
            snprintf(wind_unit, sizeof(wind_unit), "mph");
            snprintf(press_unit, sizeof(press_unit), "psi");
            snprintf(vis_unit, sizeof(vis_unit), "ft");
            snprintf(precip_unit, sizeof(precip_unit), "in/h");
          }

          char now_temp[48];
          char now_feels[64];
          char hilo[64];
          char chip_h[48];
          char chip_w[48];
          char chip_u[48];
          char chip_c[48];
          char details_1[96];
          char details_2[96];
          char details_3[96];
          char details_4[96];
          char details_5[96];
          char details_6[96];
          char details_7[96];
          char details_8[96];
          char details_9[96];
          char details_10[96];
          char details_11[96];
          char details_12[96];
          char details_diag[160];
          char units_lbl[64];
          char source_lbl[180];
          char gps_lbl[180];

          if (t <= -9000.0f) snprintf(now_temp, sizeof(now_temp), "--");
          else snprintf(now_temp, sizeof(now_temp), "%.1f %s", t, temp_unit);

          if (feels <= -9000.0f) snprintf(now_feels, sizeof(now_feels), "Feels --");
          else snprintf(now_feels, sizeof(now_feels), "Feels %.1f %s", feels, temp_unit);

          if (high <= -9000.0f || low <= -9000.0f) snprintf(hilo, sizeof(hilo), "H/L --");
          else snprintf(hilo, sizeof(hilo), "H %.1f%s   L %.1f%s", high, temp_unit, low, temp_unit);

          if (hum <= -9000.0f) snprintf(chip_h, sizeof(chip_h), "Humidity --");
          else snprintf(chip_h, sizeof(chip_h), "Humidity %.0f%%", hum);

          if (wind <= -9000.0f) snprintf(chip_w, sizeof(chip_w), "Wind --");
          else snprintf(chip_w, sizeof(chip_w), "Wind %.1f %s", wind, wind_unit);

          if (uv <= -9000.0f) snprintf(chip_u, sizeof(chip_u), "UV --");
          else snprintf(chip_u, sizeof(chip_u), "UV %.2f", uv);

          if (cloud <= -9000.0f) snprintf(chip_c, sizeof(chip_c), "Cloud --");
          else snprintf(chip_c, sizeof(chip_c), "Cloud %.0f%%", cloud);

          if (id(wx_entity_state).has_state() && !id(wx_entity_state).state.empty()) {
            snprintf(source_lbl, sizeof(source_lbl), "Source ${entity_wx_main}: %s", id(wx_entity_state).state.c_str());
          } else {
            snprintf(source_lbl, sizeof(source_lbl), "Source ${entity_wx_main}: unavailable");
          }

          bool gps_alive = (esphome::millis() - id(gps_last_update_ms)) < 15000U;
          if (!gps_alive) {
            snprintf(gps_lbl, sizeof(gps_lbl), "GPS no data. Check wiring RX ${gps_rx_pin} TX ${gps_tx_pin}");
          } else if (id(gps_satellites).state < 1.0f) {
            snprintf(gps_lbl, sizeof(gps_lbl), "GPS data alive, waiting for fix");
          } else {
            snprintf(gps_lbl, sizeof(gps_lbl), "GPS %.0f sat  lat %.5f  lon %.5f",
                     id(gps_satellites).state, id(gps_latitude).state, id(gps_longitude).state);
          }

          const char *dir_txt = "--";
          if (dir > -9000.0f) {
            if (dir >= 22.5f && dir < 67.5f) dir_txt = "NE";
            else if (dir >= 67.5f && dir < 112.5f) dir_txt = "E";
            else if (dir >= 112.5f && dir < 157.5f) dir_txt = "SE";
            else if (dir >= 157.5f && dir < 202.5f) dir_txt = "S";
            else if (dir >= 202.5f && dir < 247.5f) dir_txt = "SW";
            else if (dir >= 247.5f && dir < 292.5f) dir_txt = "W";
            else if (dir >= 292.5f && dir < 337.5f) dir_txt = "NW";
            else dir_txt = "N";
          }

          snprintf(units_lbl, sizeof(units_lbl), "Units: %s", id(app_units_mode) == 1 ? "Metric" : "Imperial");
          snprintf(details_1, sizeof(details_1), "Temp: %s", now_temp);
          snprintf(details_2, sizeof(details_2), "%s", now_feels);
          snprintf(details_3, sizeof(details_3), "High/Low: %s", hilo);
          if (hum <= -9000.0f) snprintf(details_4, sizeof(details_4), "Humidity: --");
          else snprintf(details_4, sizeof(details_4), "Humidity: %.0f%%", hum);
          if (wind <= -9000.0f) snprintf(details_5, sizeof(details_5), "Wind: --");
          else snprintf(details_5, sizeof(details_5), "Wind: %.1f %s", wind, wind_unit);
          if (gust <= -9000.0f || dir <= -9000.0f) snprintf(details_6, sizeof(details_6), "Gust/Dir: --");
          else snprintf(details_6, sizeof(details_6), "Gust %.1f %s  Dir %.0f deg %s", gust, wind_unit, dir, dir_txt);
          if (uv <= -9000.0f) snprintf(details_7, sizeof(details_7), "UV: --");
          else snprintf(details_7, sizeof(details_7), "UV: %.2f", uv);
          if (cloud <= -9000.0f) snprintf(details_8, sizeof(details_8), "Cloud: --");
          else snprintf(details_8, sizeof(details_8), "Cloud: %.0f%%", cloud);
          if (press <= -9000.0f) snprintf(details_9, sizeof(details_9), "Pressure: --");
          else snprintf(details_9, sizeof(details_9), "Pressure: %.2f %s", press, press_unit);
          if (vis <= -9000.0f) snprintf(details_10, sizeof(details_10), "Visibility: --");
          else snprintf(details_10, sizeof(details_10), "Visibility: %.1f %s", vis, vis_unit);
          if (rain <= -9000.0f && snow <= -9000.0f) snprintf(details_11, sizeof(details_11), "Rain/Snow: --");
          else snprintf(details_11, sizeof(details_11), "Rain %.2f %s  Snow %.2f %s",
                        rain <= -9000.0f ? 0.0f : rain, precip_unit,
                        snow <= -9000.0f ? 0.0f : snow, precip_unit);
          std::string precip_kind = id(wx_norm_precip_kind);
          if ((int) precip_kind.size() > 14) precip_kind = precip_kind.substr(0, 14) + ".";
          snprintf(details_12, sizeof(details_12), "Precip %s  Code %d", precip_kind.c_str(), id(wx_norm_weather_code));
          snprintf(details_diag, sizeof(details_diag), "%s | %s", source_lbl, gps_lbl);

          id(weather_now_temp_text) = std::string(now_temp);
          id(weather_now_feels_text) = std::string(now_feels);
          id(weather_hilo_text) = std::string(hilo);
          id(weather_chip_humidity_text) = std::string(chip_h);
          id(weather_chip_wind_text) = std::string(chip_w);
          id(weather_chip_uv_text) = std::string(chip_u);
          id(weather_chip_cloud_text) = std::string(chip_c);
          id(weather_details_line1_text) = std::string(details_1);
          id(weather_details_line2_text) = std::string(details_2);
          id(weather_details_line3_text) = std::string(details_3);
          id(weather_details_line4_text) = std::string(details_4);
          id(weather_details_line5_text) = std::string(details_5);
          id(weather_details_line6_text) = std::string(details_6);
          id(weather_details_line7_text) = std::string(details_7);
          id(weather_details_line8_text) = std::string(details_8);
          id(weather_details_line9_text) = std::string(details_9);
          id(weather_details_line10_text) = std::string(details_10);
          id(weather_details_line11_text) = std::string(details_11);
          id(weather_details_line12_text) = std::string(details_12);
          id(weather_details_diag_text) = std::string(details_diag);
          id(weather_units_text) = std::string(units_lbl);
          id(weather_source_text) = std::string(source_lbl);
          id(weather_gps_text) = std::string(gps_lbl);

      - lvgl.label.update:
          id: weather_now_temp_lbl
          text: !lambda "return id(weather_now_temp_text);"
      - lvgl.label.update:
          id: weather_now_cond_lbl
          text: !lambda |-
            std::string s = id(wx_norm_weather);
            if ((int) s.size() > 24) s = s.substr(0, 24) + ".";
            return s;
      - lvgl.label.update:
          id: weather_now_feels_lbl
          text: !lambda "return id(weather_now_feels_text);"
      - lvgl.label.update:
          id: weather_hilo_lbl
          text: !lambda "return id(weather_hilo_text);"
      - lvgl.label.update:
          id: weather_chip_humidity_lbl
          text: !lambda "return id(weather_chip_humidity_text);"
      - lvgl.label.update:
          id: weather_chip_wind_lbl
          text: !lambda "return id(weather_chip_wind_text);"
      - lvgl.label.update:
          id: weather_chip_uv_lbl
          text: !lambda "return id(weather_chip_uv_text);"
      - lvgl.label.update:
          id: weather_chip_cloud_lbl
          text: !lambda "return id(weather_chip_cloud_text);"
      - lvgl.label.update:
          id: weather_units_lbl
          text: !lambda "return id(weather_units_text);"
      - lvgl.label.update:
          id: weather_gps_lbl
          text: !lambda "return id(weather_gps_text);"
      - lvgl.label.update:
          id: weather_details_title_lbl
          text: !lambda |-
            std::string s = id(wx_norm_condition);
            if ((int) s.size() > 28) s = s.substr(0, 28) + ".";
            return s;
      - lvgl.label.update:
          id: weather_details_line1_lbl
          text: !lambda "return id(weather_details_line1_text);"
      - lvgl.label.update:
          id: weather_details_line2_lbl
          text: !lambda "return id(weather_details_line2_text);"
      - lvgl.label.update:
          id: weather_details_line3_lbl
          text: !lambda "return id(weather_details_line3_text);"
      - lvgl.label.update:
          id: weather_details_line4_lbl
          text: !lambda "return id(weather_details_line4_text);"
      - lvgl.label.update:
          id: weather_details_line5_lbl
          text: !lambda "return id(weather_details_line5_text);"
      - lvgl.label.update:
          id: weather_details_line6_lbl
          text: !lambda "return id(weather_details_line6_text);"
      - lvgl.label.update:
          id: weather_details_line7_lbl
          text: !lambda "return id(weather_details_line7_text);"
      - lvgl.label.update:
          id: weather_details_line8_lbl
          text: !lambda "return id(weather_details_line8_text);"
      - lvgl.label.update:
          id: weather_details_line9_lbl
          text: !lambda "return id(weather_details_line9_text);"
      - lvgl.label.update:
          id: weather_details_line10_lbl
          text: !lambda "return id(weather_details_line10_text);"
      - lvgl.label.update:
          id: weather_details_line11_lbl
          text: !lambda "return id(weather_details_line11_text);"
      - lvgl.label.update:
