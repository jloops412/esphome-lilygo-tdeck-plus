  - id: climate_resolve_mode
    mode: restart
    then:
      - lambda: |-
          auto lower = [](std::string s) -> std::string {
            for (char &c : s) {
              if (c >= 'A' && c <= 'Z') c = (char) (c - 'A' + 'a');
            }
            return s;
          };

          std::string mode;
          if (id(sensi_climate_hvac_mode).has_state()) mode = id(sensi_climate_hvac_mode).state;
          if (mode.empty() && id(sensi_climate_state).has_state()) mode = id(sensi_climate_state).state;
          mode = lower(mode);

          if (mode == "heat-cool") mode = "heat_cool";
          if (mode == "heatcool") mode = "heat_cool";

          bool known = (mode == "off" || mode == "heat" || mode == "cool" || mode == "auto" || mode == "heat_cool");
          if (!known) {
            mode = id(climate_mode_effective);
            if (mode.empty()) mode = "auto";
          }
          id(climate_mode_effective) = mode;

  - id: climate_force_resync
    mode: restart
    then:
      - lambda: |-
          id(climate_ack_pending) = false;
          id(climate_out_of_sync) = false;
          id(climate_commit_pending) = false;
          id(climate_last_commit_result) = "resync";
      - script.execute: climate_ui_seed_from_ha
      - script.execute: climate_update_labels
      - script.execute: climate_sync_controls

  - id: climate_ack_check
    mode: restart
    then:
      - script.execute: climate_resolve_mode
      - if:
          condition:
            lambda: "return id(climate_ack_pending);"
          then:
            - lambda: |-
                auto absf = [](float v) -> float { return v < 0.0f ? -v : v; };
                auto native_to_app = [&](float v) -> float {
                  if (!(v == v)) return -10000.0f;
                  bool app_metric = id(app_units_mode) == 1;
                  bool native_metric = false;
                  if (id(sensi_climate_temperature_unit).has_state()) {
                    std::string tu = id(sensi_climate_temperature_unit).state;
                    native_metric = (tu.find("C") != std::string::npos || tu.find("c") != std::string::npos);
                  }
                  if (app_metric && !native_metric) v = (v - 32.0f) * (5.0f / 9.0f);
                  else if (!app_metric && native_metric) v = (v * (9.0f / 5.0f)) + 32.0f;
                  return v;
                };

                float tol = id(app_units_mode) == 1
                  ? ((float) atoi("${climate_tolerance_c_tenths}") / 10.0f)
                  : (float) atoi("${climate_tolerance_f}");
                if (tol < 0.2f) tol = 0.2f;

                float ha_single = native_to_app(id(sensi_climate_target_temperature).state);
                float ha_heat = native_to_app(id(sensi_climate_target_temp_low).state);
                float ha_cool = native_to_app(id(sensi_climate_target_temp_high).state);

                if (ha_heat <= -9000.0f && id(sensi_auto_heat_temp).state == id(sensi_auto_heat_temp).state) {
                  ha_heat = native_to_app(id(sensi_auto_heat_temp).state);
                }
                if (ha_cool <= -9000.0f && id(sensi_auto_cool_temp).state == id(sensi_auto_cool_temp).state) {
                  ha_cool = native_to_app(id(sensi_auto_cool_temp).state);
                }

                bool ack_ok = false;
                std::string mode = id(climate_mode_effective);
                if (mode == "auto" || mode == "heat_cool") {
                  if (ha_heat > -9000.0f && ha_cool > -9000.0f) {
                    ack_ok = absf(ha_heat - id(climate_last_requested_heat)) <= tol &&
                             absf(ha_cool - id(climate_last_requested_cool)) <= tol;
                  }
                } else {
                  float expected = id(climate_last_requested_single);
                  float observed = ha_single;
                  if (observed <= -9000.0f) {
                    observed = (mode == "cool") ? ha_cool : ha_heat;
                  }
                  if (observed > -9000.0f) {
                    ack_ok = absf(observed - expected) <= tol;
                  }
                }

                uint32_t now = esphome::millis();
                if (ack_ok) {
                  id(climate_ack_pending) = false;
                  id(climate_out_of_sync) = false;
                  id(climate_ui_dirty) = false;
                  id(climate_last_commit_result) = "ack-ok";
                } else if (now >= id(climate_ack_deadline_ms)) {
                  id(climate_ack_pending) = false;
                  id(climate_out_of_sync) = true;
                  id(climate_commit_pending) = false;
                  id(climate_last_commit_result) = "ack-timeout";
                }

  - id: climate_ui_seed_from_ha
    mode: restart
    then:
      - script.execute: climate_resolve_mode
      - lambda: |-
          if (id(climate_ack_pending)) return;
          if (id(climate_out_of_sync)) return;
          uint32_t guard_ms = (uint32_t) atoi("${climate_resync_guard_ms}");
          if (guard_ms < 1000U) guard_ms = 1000U;
          if ((esphome::millis() - id(climate_last_command_ms)) < guard_ms) return;

          int heat = id(climate_ui_target_heat_f);
          int cool = id(climate_ui_target_cool_f);

          bool app_metric = id(app_units_mode) == 1;
          bool native_metric = false;
          if (id(sensi_climate_temperature_unit).has_state()) {
            std::string tu = id(sensi_climate_temperature_unit).state;
            native_metric = (tu.find("C") != std::string::npos || tu.find("c") != std::string::npos);
          }

          auto native_to_app = [&](float v) -> int {
            if (!(v == v)) return 0;
            if (app_metric && !native_metric) v = (v - 32.0f) * (5.0f / 9.0f);
            else if (!app_metric && native_metric) v = (v * (9.0f / 5.0f)) + 32.0f;
            return (int) (v + (v >= 0.0f ? 0.5f : -0.5f));
          };

          if (id(sensi_climate_target_temp_low).state == id(sensi_climate_target_temp_low).state) {
            heat = native_to_app(id(sensi_climate_target_temp_low).state);
          } else if (id(sensi_auto_heat_temp).state == id(sensi_auto_heat_temp).state) {
            heat = native_to_app(id(sensi_auto_heat_temp).state);
          }
          if (id(sensi_climate_target_temp_high).state == id(sensi_climate_target_temp_high).state) {
            cool = native_to_app(id(sensi_climate_target_temp_high).state);
          } else if (id(sensi_auto_cool_temp).state == id(sensi_auto_cool_temp).state) {
            cool = native_to_app(id(sensi_auto_cool_temp).state);
          }

          id(climate_ui_target_heat_f) = heat;
          id(climate_ui_target_cool_f) = cool;

          std::string mode = id(climate_mode_effective);
          if (mode == "heat") id(climate_ui_target_single_f) = heat;
          else if (mode == "cool") id(climate_ui_target_single_f) = cool;
          else id(climate_ui_target_single_f) = (heat + cool) / 2;

          id(climate_ui_dirty) = true;
      - script.execute: climate_ui_clamp_targets

  - id: climate_ui_clamp_targets
    mode: restart
    then:
      - lambda: |-
          int min_v = atoi("${climate_temp_min_f}");
          int max_v = atoi("${climate_temp_max_f}");
          int band_v = atoi("${climate_auto_band_min_delta_f}");

          if (id(app_units_mode) == 1) {
            min_v = (int) (((min_v - 32.0f) * (5.0f / 9.0f)) + 0.5f);
            max_v = (int) (((max_v - 32.0f) * (5.0f / 9.0f)) + 0.5f);
            band_v = (int) (((float) band_v * (5.0f / 9.0f)) + 0.5f);
          }

          if (min_v < -20) min_v = -20;
          if (max_v > 120) max_v = 120;
          if (max_v <= min_v) max_v = min_v + 1;
          if (band_v < 1) band_v = 1;

          if (id(climate_ui_target_single_f) < min_v) id(climate_ui_target_single_f) = min_v;
          if (id(climate_ui_target_single_f) > max_v) id(climate_ui_target_single_f) = max_v;
          if (id(climate_ui_target_heat_f) < min_v) id(climate_ui_target_heat_f) = min_v;
          if (id(climate_ui_target_heat_f) > max_v) id(climate_ui_target_heat_f) = max_v;
          if (id(climate_ui_target_cool_f) < min_v) id(climate_ui_target_cool_f) = min_v;
          if (id(climate_ui_target_cool_f) > max_v) id(climate_ui_target_cool_f) = max_v;

          if (id(climate_ui_target_cool_f) < id(climate_ui_target_heat_f) + band_v) {
            id(climate_ui_target_cool_f) = id(climate_ui_target_heat_f) + band_v;
            if (id(climate_ui_target_cool_f) > max_v) {
              id(climate_ui_target_cool_f) = max_v;
              id(climate_ui_target_heat_f) = id(climate_ui_target_cool_f) - band_v;
              if (id(climate_ui_target_heat_f) < min_v) id(climate_ui_target_heat_f) = min_v;
            }
          }

