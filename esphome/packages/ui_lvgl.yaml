            std::string mode = id(climate_mode_effective);
            return !(mode == "auto" || mode == "heat_cool" || mode == "heat-cool");
      - lvgl.widget.update:
          id: climate_auto_cool_minus_btn
          hidden: !lambda |-
            std::string mode = id(climate_mode_effective);
            return !(mode == "auto" || mode == "heat_cool" || mode == "heat-cool");
      - lvgl.widget.update:
          id: climate_auto_cool_plus_btn
          hidden: !lambda |-
            std::string mode = id(climate_mode_effective);
            return !(mode == "auto" || mode == "heat_cool" || mode == "heat-cool");
      - lambda: |-
          id(climate_ui_sync_in_progress) = false;
          id(climate_ui_dirty) = false;

  - id: lvgl_sync_lights_controls
    mode: restart
    then:
      - lambda: |-
          id(ui_sync_in_progress) = true;
      - lvgl.widget.update:
          id: light_slot_1_btn
          hidden: !lambda "return atoi(\"${light_slot_count}\") < 1;"
      - lvgl.widget.update:
          id: light_slot_2_btn
          hidden: !lambda "return atoi(\"${light_slot_count}\") < 2;"
      - lvgl.widget.update:
          id: light_slot_3_btn
          hidden: !lambda "return atoi(\"${light_slot_count}\") < 3;"
      - lvgl.widget.update:
          id: light_slot_4_btn
          hidden: !lambda "return atoi(\"${light_slot_count}\") < 4;"
      - lvgl.widget.update:
          id: light_slot_5_btn
          hidden: !lambda "return atoi(\"${light_slot_count}\") < 5;"
      - lvgl.widget.update:
          id: light_slot_6_btn
          hidden: !lambda "return atoi(\"${light_slot_count}\") < 6;"
      - lvgl.widget.update:
          id: light_slot_7_btn
          hidden: !lambda "return atoi(\"${light_slot_count}\") < 7;"
      - lvgl.widget.update:
          id: light_slot_8_btn
          hidden: !lambda "return atoi(\"${light_slot_count}\") < 8;"
      - lvgl.widget.update:
          id: lights_power_switch
          state:
            checked: !lambda |-
              std::string s = "-";
              if (id(selected_light) == 0 && id(light_slot_1_state).has_state()) s = id(light_slot_1_state).state;
              else if (id(selected_light) == 1 && id(light_slot_2_state).has_state()) s = id(light_slot_2_state).state;
              else if (id(selected_light) == 2 && id(light_slot_3_state).has_state()) s = id(light_slot_3_state).state;
              else if (id(selected_light) == 3 && id(light_slot_4_state).has_state()) s = id(light_slot_4_state).state;
              else if (id(selected_light) == 4 && id(light_slot_5_state).has_state()) s = id(light_slot_5_state).state;
              else if (id(selected_light) == 5 && id(light_slot_6_state).has_state()) s = id(light_slot_6_state).state;
              else if (id(selected_light) == 6 && id(light_slot_7_state).has_state()) s = id(light_slot_7_state).state;
              else if (id(selected_light) == 7 && id(light_slot_8_state).has_state()) s = id(light_slot_8_state).state;
              return s == "on" || s == "ON" || s == "On";
      - lvgl.slider.update:
          id: light_color_kelvin_slider
          value: !lambda "return id(selected_light_kelvin);"
      - lambda: |-
          id(ui_sync_in_progress) = false;
          id(lights_dirty) = false;

  - id: lvgl_sync_nonlight_controls
    mode: restart
    then:
      - lvgl.slider.update:
          id: settings_saver_slider
          value: !lambda "return id(screensaver_timeout_s);"
      - lvgl.slider.update:
          id: display_brightness_slider
          value: !lambda "return id(backlight_percent);"

  - id: lvgl_update_dynamic
    mode: restart
    then:
      - script.execute: lvgl_update_labels
      - script.execute: climate_update_labels
      - script.execute: home_weather_icon_sync
      - script.execute: settings_section_show
      - script.execute: lvgl_sync_nonlight_controls
      - script.execute: lvgl_sync_lights_controls
      - script.execute: climate_sync_controls

