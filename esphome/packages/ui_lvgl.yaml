
http_request:
  verify_ssl: false
  timeout: 8s

online_image:
  - id: camera_slot_1_image
    url: "${ha_base_url}/local/tdeck/cam1.jpg?boot=0"
    resize: 150x70
    format: JPEG
    type: RGB565
    update_interval: never
  - id: camera_slot_2_image
    url: "${ha_base_url}/local/tdeck/cam2.jpg?boot=0"
    resize: 150x70
    format: JPEG
    type: RGB565
    update_interval: never

script:
  - id: activity_note
    parameters:
      source: string
      code: int
    then:
      - lambda: |-
          uint32_t now = esphome::millis();
          uint32_t min_interval = 1200U;
          if (source == "keyboard") {
            min_interval = (uint32_t) atoi("${screensaver_keyboard_activity_min_interval_ms}");
            if (min_interval < 120U) min_interval = 120U;
          }

          if (id(screensaver_active)) {
            if (source == "keyboard" && !id(wake_on_keyboard)) {
              return;
            }
            id(last_activity_source) = source;
            id(last_activity_code) = code;
            id(last_activity_note_ms) = now;
            id(last_activity_ms) = now;
            id(wake_display).execute();
            return;
          }

          if ((now - id(last_activity_note_ms)) < min_interval) {
            return;
          }

          id(last_activity_source) = source;
          id(last_activity_code) = code;
          id(last_activity_note_ms) = now;
          id(last_activity_ms) = now;

  - id: activity_note_keyboard
    parameters:
      key: int
    then:
      - lambda: |-
          if (key <= 0) return;
          // ESC is ALT-prefix in this keyboard path; do not treat it as activity.
          if (key == 0x1B) return;

          uint32_t now = esphome::millis();
          uint32_t repeat_suppress = (uint32_t) atoi("${screensaver_keyboard_repeat_suppress_ms}");
          if (repeat_suppress < 200U) repeat_suppress = 200U;
          if (repeat_suppress > 8000U) repeat_suppress = 8000U;

          if (id(kb_last_activity_key) == key &&
              (now - id(kb_last_activity_ms)) < repeat_suppress) {
            return;
          }

          id(kb_last_activity_key) = key;
          id(kb_last_activity_ms) = now;
      - script.execute:
          id: activity_note
          source: "keyboard"
          code: !lambda "return key;"

  - id: note_activity
    then:
      - script.execute:
          id: activity_note
          source: "input"
          code: 0

  - id: screensaver_tick
    then:
      - lambda: |-
          if (id(screensaver_active) || !id(screensaver_enabled)) return;
          uint32_t now = esphome::millis();
          if (id(touch_active)) {
            // Guard against a missed touch-release event that can block auto-sleep indefinitely.
            if ((now - id(touch_last_ms)) > 4000U) {
              id(touch_active) = false;
            } else {
              return;
            }
          }
          uint32_t timeout_ms = (uint32_t) id(screensaver_timeout_s) * 1000UL;
          if (timeout_ms < 5000UL) timeout_ms = 5000UL;
          if ((now - id(last_activity_ms)) >= timeout_ms) {
            id(sleep_display).execute();
          }

  - id: page_next
    then:
      - lvgl.page.next:
      - script.execute: lvgl_update_dynamic

  - id: page_prev
    then:
      - lvgl.page.previous:
      - script.execute: lvgl_update_dynamic

  - id: wake_display
    then:
      - lambda: |-
          uint32_t now = esphome::millis();
          id(screensaver_active) = false;
          id(last_activity_source) = "wake";
          id(last_activity_code) = 0;
          id(last_activity_ms) = now;
          id(last_activity_note_ms) = now;
      - light.turn_on:
          id: tft_backlight
          brightness: !lambda "return id(backlight_percent) / 100.0f;"
      - lvgl.resume:
      - script.execute: lvgl_update_dynamic

  - id: sleep_display
    then:
      - lambda: |-
          id(screensaver_active) = true;
      - lvgl.pause:
          show_snow: false
      - light.turn_off: tft_backlight

  - id: saver_timeout_down
    then:
      - lambda: |-
          id(screensaver_timeout_s) -= 5;
          if (id(screensaver_timeout_s) < 10) id(screensaver_timeout_s) = 10;
      - script.execute: lvgl_update_dynamic

  - id: saver_timeout_up
    then:
      - lambda: |-
          id(screensaver_timeout_s) += 5;
          if (id(screensaver_timeout_s) > 300) id(screensaver_timeout_s) = 300;
      - script.execute: lvgl_update_dynamic

  - id: set_saver_timeout
    parameters:
      seconds: int
    then:
      - lambda: |-
          seconds = ((seconds + 2) / 5) * 5;
          if (seconds < 10) seconds = 10;
          if (seconds > 300) seconds = 300;
          id(screensaver_timeout_s) = seconds;
      - lvgl.slider.update:
          id: settings_saver_slider
          value: !lambda "return id(screensaver_timeout_s);"
      - script.execute: lvgl_update_dynamic

  - id: toggle_screensaver_enabled
    mode: restart
    then:
      - lambda: |-
          id(screensaver_enabled) = !id(screensaver_enabled);
      - script.execute: lvgl_update_dynamic

  - id: toggle_wake_touch
    then:
      - lambda: |-
          id(wake_on_touch) = !id(wake_on_touch);
      - script.execute: lvgl_update_dynamic

  - id: toggle_wake_keyboard
    then:
      - lambda: |-
          id(wake_on_keyboard) = !id(wake_on_keyboard);
      - script.execute: lvgl_update_dynamic

  - id: toggle_wake_trackball
    then:
      - lambda: |-
          id(wake_on_trackball) = !id(wake_on_trackball);
      - script.execute: lvgl_update_dynamic

  - id: toggle_touch_debug
    then:
      - lambda: |-
          id(touch_debug) = !id(touch_debug);
      - script.execute: lvgl_update_dynamic

  - id: start_touch_calibration
    then:
      - lambda: |-
          id(touch_cal_mode) = true;
          id(touch_cal_review_pending) = false;
          id(touch_cal_step) = 0;
          id(touch_active) = false;
          id(touch_cal_candidate_x_min) = 0;
          id(touch_cal_candidate_x_max) = 0;
          id(touch_cal_candidate_y_min) = 0;
          id(touch_cal_candidate_y_max) = 0;
          id(cal_raw_tl_x) = 0; id(cal_raw_tl_y) = 0;
          id(cal_raw_tr_x) = 0; id(cal_raw_tr_y) = 0;
          id(cal_raw_bl_x) = 0; id(cal_raw_bl_y) = 0;
          id(cal_raw_br_x) = 0; id(cal_raw_br_y) = 0;
          id(cal9_raw_tl_x) = 0; id(cal9_raw_tl_y) = 0;
          id(cal9_raw_tc_x) = 0; id(cal9_raw_tc_y) = 0;
          id(cal9_raw_tr_x) = 0; id(cal9_raw_tr_y) = 0;
          id(cal9_raw_ml_x) = 0; id(cal9_raw_ml_y) = 0;
          id(cal9_raw_mc_x) = 0; id(cal9_raw_mc_y) = 0;
          id(cal9_raw_mr_x) = 0; id(cal9_raw_mr_y) = 0;
          id(cal9_raw_bl_x) = 0; id(cal9_raw_bl_y) = 0;
          id(cal9_raw_bc_x) = 0; id(cal9_raw_bc_y) = 0;
          id(cal9_raw_br_x) = 0; id(cal9_raw_br_y) = 0;
      - lvgl.page.show: touch_cal_page
      - script.execute: lvgl_update_dynamic

  - id: reset_touch_calibration
    then:
      - lambda: |-
          id(cal_dx_tl) = 0; id(cal_dy_tl) = 0;
          id(cal_dx_tc) = 0; id(cal_dy_tc) = 0;
          id(cal_dx_tr) = 0; id(cal_dy_tr) = 0;
          id(cal_dx_ml) = 0; id(cal_dy_ml) = 0;
          id(cal_dx_mc) = 0; id(cal_dy_mc) = 0;
          id(cal_dx_mr) = 0; id(cal_dy_mr) = 0;
          id(cal_dx_bl) = 0; id(cal_dy_bl) = 0;
          id(cal_dx_bc) = 0; id(cal_dy_bc) = 0;
          id(cal_dx_br) = 0; id(cal_dy_br) = 0;
          id(cal_raw_tl_x) = 0; id(cal_raw_tl_y) = 0;
          id(cal_raw_tr_x) = 0; id(cal_raw_tr_y) = 0;
          id(cal_raw_bl_x) = 0; id(cal_raw_bl_y) = 0;
          id(cal_raw_br_x) = 0; id(cal_raw_br_y) = 0;
          id(cal9_raw_tl_x) = 0; id(cal9_raw_tl_y) = 0;
          id(cal9_raw_tc_x) = 0; id(cal9_raw_tc_y) = 0;
          id(cal9_raw_tr_x) = 0; id(cal9_raw_tr_y) = 0;
          id(cal9_raw_ml_x) = 0; id(cal9_raw_ml_y) = 0;
          id(cal9_raw_mc_x) = 0; id(cal9_raw_mc_y) = 0;
          id(cal9_raw_mr_x) = 0; id(cal9_raw_mr_y) = 0;
          id(cal9_raw_bl_x) = 0; id(cal9_raw_bl_y) = 0;
          id(cal9_raw_bc_x) = 0; id(cal9_raw_bc_y) = 0;
          id(cal9_raw_br_x) = 0; id(cal9_raw_br_y) = 0;
          id(touch_cal_candidate_x_min) = 0;
          id(touch_cal_candidate_x_max) = 0;
          id(touch_cal_candidate_y_min) = 0;
          id(touch_cal_candidate_y_max) = 0;
          id(touch_cal_mode) = false;
          id(touch_cal_review_pending) = false;
          id(touch_cal_step) = 0;
      - lambda: |-
          id(touch_cal_suggest_x_min) = atoi("${touch_x_min}");
          id(touch_cal_suggest_x_max) = atoi("${touch_x_max}");
          id(touch_cal_suggest_y_min) = atoi("${touch_y_min}");
          id(touch_cal_suggest_y_max) = atoi("${touch_y_max}");
      - script.execute: touch_cal_apply_stored
      - script.execute: lvgl_update_dynamic

  - id: touch_cal_save
    then:
      - if:
          condition:
            lambda: "return id(touch_cal_review_pending);"
          then:
            - lambda: |-
                id(touch_cal_suggest_x_min) = id(touch_cal_candidate_x_min);
                id(touch_cal_suggest_x_max) = id(touch_cal_candidate_x_max);
                id(touch_cal_suggest_y_min) = id(touch_cal_candidate_y_min);
                id(touch_cal_suggest_y_max) = id(touch_cal_candidate_y_max);
                id(touch_cal_review_pending) = false;
            - script.execute: touch_cal_apply_stored
            - lvgl.page.show: settings_page
      - script.execute: lvgl_update_dynamic

  - id: touch_cal_retry
    then:
      - script.execute: start_touch_calibration

  - id: touch_cal_apply_stored
    then:
      - lambda: |-
          if (id(touch_cal_suggest_x_max) > id(touch_cal_suggest_x_min) &&
              id(touch_cal_suggest_y_max) > id(touch_cal_suggest_y_min)) {
            id(tdeck_touch).set_calibration(
              id(touch_cal_suggest_x_min),
              id(touch_cal_suggest_x_max),
              id(touch_cal_suggest_y_min),
              id(touch_cal_suggest_y_max)
            );
            ESP_LOGI("touch_cal", "Using persisted calibration x_min=%d x_max=%d y_min=%d y_max=%d",
                     id(touch_cal_suggest_x_min),
                     id(touch_cal_suggest_x_max),
                     id(touch_cal_suggest_y_min),
                     id(touch_cal_suggest_y_max));
          }

  - id: select_light
    parameters:
      idx: int
    then:
      - lambda: |-
          int slot_count = atoi("${light_slot_count}");
          if (slot_count < 1) slot_count = 1;
          if (slot_count > 8) slot_count = 8;
          if (idx < 0) idx = 0;
          if (idx >= slot_count) return;
          id(selected_light) = idx;
      - script.execute: resolve_selected_light_target
      - script.execute: lvgl_update_dynamic

  - id: display_backlight_down
    then:
      - lambda: |-
          id(backlight_percent) -= 10;
          if (id(backlight_percent) < 10) id(backlight_percent) = 10;
      - light.turn_on:
          id: tft_backlight
          brightness: !lambda "return id(backlight_percent) / 100.0f;"
      - script.execute: lvgl_update_dynamic

  - id: display_backlight_up
    then:
      - lambda: |-
          id(backlight_percent) += 10;
          if (id(backlight_percent) > 100) id(backlight_percent) = 100;
      - light.turn_on:
          id: tft_backlight
          brightness: !lambda "return id(backlight_percent) / 100.0f;"
      - script.execute: lvgl_update_dynamic

  - id: set_display_backlight
    parameters:
      pct: int
    then:
      - lambda: |-
          pct = ((pct + 2) / 5) * 5;
          if (pct < 10) pct = 10;
          if (pct > 100) pct = 100;
          id(backlight_percent) = pct;
      - light.turn_on:
          id: tft_backlight
          brightness: !lambda "return id(backlight_percent) / 100.0f;"
      - lvgl.slider.update:
          id: display_brightness_slider
          value: !lambda "return id(backlight_percent);"
      - script.execute: lvgl_update_dynamic

  - id: selected_light_prev
    then:
      - lambda: |-
          int slot_count = atoi("${light_slot_count}");
          if (slot_count < 1) slot_count = 1;
          if (slot_count > 8) slot_count = 8;
          id(selected_light) = (id(selected_light) + slot_count - 1) % slot_count;
      - script.execute: resolve_selected_light_target
      - script.execute: lvgl_update_dynamic

  - id: selected_light_next
    then:
      - lambda: |-
          int slot_count = atoi("${light_slot_count}");
          if (slot_count < 1) slot_count = 1;
          if (slot_count > 8) slot_count = 8;
          id(selected_light) = (id(selected_light) + 1) % slot_count;
      - script.execute: resolve_selected_light_target
      - script.execute: lvgl_update_dynamic

  - id: resolve_selected_light_target
    then:
      - lambda: |-
          int slot_count = atoi("${light_slot_count}");
          if (slot_count < 1) slot_count = 1;
          if (slot_count > 8) slot_count = 8;
          if (id(selected_light) < 0) id(selected_light) = 0;
          if (id(selected_light) >= slot_count) id(selected_light) = slot_count - 1;

          if (id(selected_light) == 0) {
            id(selected_light_name) = "${light_slot_1_name}";
            id(selected_light_entity) = "${light_slot_1_entity}";
          } else if (id(selected_light) == 1) {
            id(selected_light_name) = "${light_slot_2_name}";
            id(selected_light_entity) = "${light_slot_2_entity}";
          } else if (id(selected_light) == 2) {
            id(selected_light_name) = "${light_slot_3_name}";
            id(selected_light_entity) = "${light_slot_3_entity}";
          } else if (id(selected_light) == 3) {
            id(selected_light_name) = "${light_slot_4_name}";
            id(selected_light_entity) = "${light_slot_4_entity}";
          } else if (id(selected_light) == 4) {
            id(selected_light_name) = "${light_slot_5_name}";
            id(selected_light_entity) = "${light_slot_5_entity}";
          } else if (id(selected_light) == 5) {
            id(selected_light_name) = "${light_slot_6_name}";
            id(selected_light_entity) = "${light_slot_6_entity}";
          } else if (id(selected_light) == 6) {
            id(selected_light_name) = "${light_slot_7_name}";
            id(selected_light_entity) = "${light_slot_7_entity}";
          } else {
            id(selected_light_name) = "${light_slot_8_name}";
            id(selected_light_entity) = "${light_slot_8_entity}";
          }

  - id: selected_light_toggle
    mode: restart
    then:
      - homeassistant.action:
          action: light.toggle
          data:
            entity_id: !lambda "return id(selected_light_entity);"
      - lambda: |-
          id(lights_dirty) = true;
      - script.execute: lvgl_update_dynamic

  - id: selected_light_turn_on
    mode: restart
    then:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: !lambda "return id(selected_light_entity);"
      - lambda: |-
          id(lights_dirty) = true;
      - script.execute: lvgl_update_dynamic

  - id: selected_light_turn_off
    mode: restart
    then:
      - homeassistant.action:
          action: light.turn_off
          data:
            entity_id: !lambda "return id(selected_light_entity);"
      - lambda: |-
          id(lights_dirty) = true;
      - script.execute: lvgl_update_dynamic

  - id: selected_light_brighter
    then:
      - script.execute:
          id: selected_light_set_brightness_pct
          pct: !lambda "return id(selected_light_brightness_pct) + 10;"

  - id: selected_light_dimmer
    then:
      - script.execute:
          id: selected_light_set_brightness_pct
          pct: !lambda "return id(selected_light_brightness_pct) - 10;"

  - id: selected_light_set_brightness_pct
    mode: restart
    parameters:
      pct: int
    then:
      - script.execute:
          id: selected_light_set_brightness_local
          pct: !lambda "return pct;"
      - script.execute: selected_light_commit_brightness
      - script.execute: lvgl_update_dynamic

  - id: selected_light_set_brightness_local
    mode: restart
    parameters:
      pct: int
    then:
      - lambda: |-
          pct = ((pct + 5) / 10) * 10;
          if (pct < 1) pct = 1;
          if (pct > 100) pct = 100;
          id(selected_light_brightness_pct) = pct;

  - id: selected_light_commit_brightness
    mode: restart
    then:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: !lambda "return id(selected_light_entity);"
            brightness_pct: !lambda "return id(selected_light_brightness_pct);"
      - lambda: |-
          id(lights_dirty) = true;

  - id: selected_light_warm
    mode: restart
    then:
      - script.execute:
          id: selected_light_set_kelvin
          kelvin: 2700

  - id: selected_light_cool
    mode: restart
    then:
      - script.execute:
          id: selected_light_set_kelvin
          kelvin: 6500

  - id: selected_light_color
    mode: restart
    parameters:
      cname: string
    then:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: !lambda "return id(selected_light_entity);"
            color_name: !lambda "return cname;"
      - lambda: |-
          id(lights_dirty) = true;
      - script.execute: lvgl_update_dynamic

  - id: set_light_color_index
    parameters:
      idx: int
    then:
      - lambda: |-
          if (idx < 0) idx = 0;
          if (idx > 11) idx = 11;
          id(light_color_index) = idx;
      - script.execute: refresh_light_color_meta

  - id: apply_light_color_index
    mode: restart
    then:
      - if:
          condition:
            lambda: "return id(light_color_index) == 0;"
          then:
            - script.execute: selected_light_warm
      - if:
          condition:
            lambda: "return id(light_color_index) == 1;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "white"
      - if:
          condition:
            lambda: "return id(light_color_index) == 2;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "amber"
      - if:
          condition:
            lambda: "return id(light_color_index) == 3;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "orange"
      - if:
          condition:
            lambda: "return id(light_color_index) == 4;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "yellow"
      - if:
          condition:
            lambda: "return id(light_color_index) == 5;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "green"
      - if:
          condition:
            lambda: "return id(light_color_index) == 6;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "cyan"
      - if:
          condition:
            lambda: "return id(light_color_index) == 7;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "blue"
      - if:
          condition:
            lambda: "return id(light_color_index) == 8;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "purple"
      - if:
          condition:
            lambda: "return id(light_color_index) == 9;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "magenta"
      - if:
          condition:
            lambda: "return id(light_color_index) == 10;"
          then:
            - script.execute:
                id: selected_light_color
                cname: "red"
      - if:
          condition:
            lambda: "return id(light_color_index) == 11;"
          then:
            - script.execute: selected_light_cool

  - id: refresh_light_color_meta
    then:
      - lvgl.widget.update:
          id: light_color_selector_ring
          x: !lambda |-
            int col = id(light_color_index) % 4;
            return 16 + (col * 42);
          y: !lambda |-
            int row = id(light_color_index) / 4;
            return 90 + (row * 36);
      - lvgl.label.update:
          id: light_color_preview_lbl
          text: !lambda |-
            if (id(light_color_index) == 0) return std::string("Warm White");
            if (id(light_color_index) == 1) return std::string("Neutral White");
            if (id(light_color_index) == 2) return std::string("Amber");
            if (id(light_color_index) == 3) return std::string("Orange");
            if (id(light_color_index) == 4) return std::string("Yellow");
            if (id(light_color_index) == 5) return std::string("Green");
            if (id(light_color_index) == 6) return std::string("Cyan");
            if (id(light_color_index) == 7) return std::string("Blue");
            if (id(light_color_index) == 8) return std::string("Purple");
            if (id(light_color_index) == 9) return std::string("Magenta");
            if (id(light_color_index) == 10) return std::string("Red");
            return std::string("Cool White");

  - id: all_lights_off
    mode: restart
    then:
      - if:
          condition:
            lambda: "return atoi(\"${light_slot_count}\") >= 1;"
          then:
            - homeassistant.action:
                action: light.turn_off
                data:
                  entity_id: ${light_slot_1_entity}
      - if:
          condition:
            lambda: "return atoi(\"${light_slot_count}\") >= 2;"
          then:
            - homeassistant.action:
                action: light.turn_off
                data:
                  entity_id: ${light_slot_2_entity}
      - if:
          condition:
            lambda: "return atoi(\"${light_slot_count}\") >= 3;"
          then:
            - homeassistant.action:
                action: light.turn_off
                data:
                  entity_id: ${light_slot_3_entity}
      - if:
          condition:
            lambda: "return atoi(\"${light_slot_count}\") >= 4;"
          then:
            - homeassistant.action:
                action: light.turn_off
                data:
                  entity_id: ${light_slot_4_entity}
      - if:
          condition:
