              else if (id(selected_light) == 1 && id(light_slot_2_state).has_state()) s = id(light_slot_2_state).state;
              else if (id(selected_light) == 2 && id(light_slot_3_state).has_state()) s = id(light_slot_3_state).state;
              else if (id(selected_light) == 3 && id(light_slot_4_state).has_state()) s = id(light_slot_4_state).state;
              else if (id(selected_light) == 4 && id(light_slot_5_state).has_state()) s = id(light_slot_5_state).state;
              else if (id(selected_light) == 5 && id(light_slot_6_state).has_state()) s = id(light_slot_6_state).state;
