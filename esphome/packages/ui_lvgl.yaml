      - script.execute: app_units_apply

  - id: app_units_init_from_ha
    then:
      - lambda: |-
          if (id(app_units_initialized) && id(app_units_mode) >= 0) return;

          auto lower = [](std::string s) -> std::string {
            for (char &c : s) {
              if (c >= 'A' && c <= 'Z') c = (char) (c - 'A' + 'a');
            }
            return s;
          };

          int mode = 0;
          std::string source = "fallback-imperial";

          if (id(ha_unit_system).has_state() && !id(ha_unit_system).state.empty()) {
            std::string s = lower(id(ha_unit_system).state);
            if (s.find("metric") != std::string::npos || s.find("si") != std::string::npos) {
              mode = 1;
            } else {
              mode = 0;
            }
            source = std::string("ha-unit-system:") + s;
          } else if (id(wx_temperature_unit_text).has_state() && !id(wx_temperature_unit_text).state.empty()) {
            std::string s = lower(id(wx_temperature_unit_text).state);
            if (s.find("c") != std::string::npos) mode = 1;
            else mode = 0;
            source = std::string("weather-temp-unit:") + s;
          }

          id(app_units_mode) = mode;
          id(app_units_initialized) = true;
          id(app_units_source) = source;
      - script.execute: app_units_apply

