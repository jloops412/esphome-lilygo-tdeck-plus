      - if:
          condition:
            lambda: "return atoi(\"${camera_slot_count}\") >= 1;"
          then:
            - online_image.set_url:
                id: camera_slot_1_image
                url: !lambda "return id(camera_slot_1_url);"
      - if:
          condition:
            lambda: "return atoi(\"${camera_slot_count}\") >= 2;"
          then:
            - online_image.set_url:
                id: camera_slot_2_image
                url: !lambda "return id(camera_slot_2_url);"

  - id: camera_refresh_all
    mode: restart
    then:
      - if:
          condition:
            lambda: "return atoi(\"${camera_slot_count}\") > 0;"
          then:
            - lambda: |-
                id(camera_refresh_in_progress) = true;
                id(camera_last_refresh_ms) = esphome::millis();
                id(camera_slot_1_status) = "Refreshing...";
                id(camera_slot_2_status) = "Refreshing...";
                id(camera_refresh_status_text) = "refreshing";
                id(camera_last_snapshot_result) = "requested";
            - script.execute: camera_snapshot_trigger_all
            - delay: 900ms
            - script.execute: camera_images_pull
            - lambda: |-
                id(camera_refresh_in_progress) = false;
                id(camera_slot_1_status) = id(camera_slot_1_state).has_state() ? id(camera_slot_1_state).state : std::string("No state");
                id(camera_slot_2_status) = id(camera_slot_2_state).has_state() ? id(camera_slot_2_state).state : std::string("No state");
                uint32_t age = (esphome::millis() - id(camera_last_refresh_ms)) / 1000U;
                char status[48];
                snprintf(status, sizeof(status), "ok (%lus ago)", (unsigned long) age);
                id(camera_refresh_status_text) = std::string(status);
                id(camera_last_snapshot_result) = "snapshot+pull ok";
            - script.execute: lvgl_update_labels

