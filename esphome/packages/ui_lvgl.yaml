  - id: weather_update_model
    mode: restart
    then:
      - lambda: |-
          const float NA = -10000.0f;

          auto lower = [](std::string s) -> std::string {
            for (char &c : s) {
              if (c >= 'A' && c <= 'Z') c = (char) (c - 'A' + 'a');
            }
            return s;
          };

          auto clean_text = [&](const std::string &in) -> std::string {
            std::string s = lower(in);
            if (s.empty() || s == "unknown" || s == "unavailable" || s == "none" || s == "null" || s == "-") {
              return std::string("");
            }
            return in;
          };

          auto parse_text_float = [&](const std::string &in, float fallback) -> float {
            std::string s = lower(in);
            if (s.empty() || s == "unknown" || s == "unavailable" || s == "none" || s == "null" || s == "-") {
              return fallback;
            }
            char *end_ptr = nullptr;
            float v = strtof(s.c_str(), &end_ptr);
            if (end_ptr == s.c_str()) return fallback;
            return v;
          };

          auto pick_num = [&](float a, float b) -> float {
            return (a == a) ? a : b;
          };

          bool ha_metric = false;
          if (id(ha_unit_system).has_state()) {
            std::string s = lower(id(ha_unit_system).state);
            ha_metric = (s.find("metric") != std::string::npos || s.find("si") != std::string::npos);
          }

          std::string temp_unit = id(wx_temperature_unit_text).has_state() ? lower(id(wx_temperature_unit_text).state) : std::string("");
          std::string pressure_unit = id(wx_pressure_unit_text).has_state() ? lower(id(wx_pressure_unit_text).state) : std::string("");
          std::string vis_unit = id(wx_visibility_unit_text).has_state() ? lower(id(wx_visibility_unit_text).state) : std::string("");
          std::string wind_unit = id(wx_wind_speed_unit_text).has_state() ? lower(id(wx_wind_speed_unit_text).state) : std::string("");
          std::string precip_unit = id(wx_precip_unit_text).has_state() ? lower(id(wx_precip_unit_text).state) : std::string("");

          auto temp_to_c = [&](float v) -> float {
            if (v <= -9000.0f) return v;
            if (temp_unit.find("f") != std::string::npos) return (v - 32.0f) * (5.0f / 9.0f);
            return v;
          };

          auto wind_to_mps = [&](float v) -> float {
            if (v <= -9000.0f) return v;
            if (wind_unit.find("mph") != std::string::npos || wind_unit.find("mi/") != std::string::npos) return v * 0.44704f;
            if (wind_unit.find("km") != std::string::npos) return v / 3.6f;
            if (wind_unit.find("knot") != std::string::npos || wind_unit == "kt") return v * 0.514444f;
            if (wind_unit.find("m/s") != std::string::npos || wind_unit.find("mps") != std::string::npos) return v;
            if (wind_unit.empty()) {
              return ha_metric ? v : (v * 0.44704f);
            }
            return v;
          };

          auto pressure_to_hpa = [&](float v) -> float {
            if (v <= -9000.0f) return v;
            if (pressure_unit.find("psi") != std::string::npos) return v * 68.9476f;
            if (pressure_unit.find("inhg") != std::string::npos) return v * 33.8639f;
            if (pressure_unit.find("mmhg") != std::string::npos) return v * 1.33322f;
            if (pressure_unit.find("bar") != std::string::npos && pressure_unit.find("mbar") == std::string::npos) return v * 1000.0f;
            if (pressure_unit.find("kpa") != std::string::npos) return v * 10.0f;
            if (pressure_unit == "pa") return v / 100.0f;
            return v;
          };

          auto visibility_to_m = [&](float v) -> float {
            if (v <= -9000.0f) return v;
            if (vis_unit.find("ft") != std::string::npos) return v * 0.3048f;
            if (vis_unit.find("mi") != std::string::npos) return v * 1609.34f;
            if (vis_unit.find("km") != std::string::npos) return v * 1000.0f;
            if (vis_unit.find("m") != std::string::npos) return v;
            if (vis_unit.empty()) {
              return ha_metric ? v : (v * 0.3048f);
            }
            return v;
          };

          auto precip_to_mm_h = [&](float v) -> float {
            if (v <= -9000.0f) return v;
            if (precip_unit.find("in") != std::string::npos) return v * 25.4f;
            if (precip_unit.find("cm") != std::string::npos) return v * 10.0f;
            if (precip_unit.find("mm") != std::string::npos) return v;
            if (precip_unit.empty()) {
              return ha_metric ? v : (v * 25.4f);
            }
            return v;
          };

          float raw_temp = pick_num(id(wx_temp).state, id(wx_entity_temperature).state);
          float raw_feels = pick_num(id(wx_feels).state, id(wx_apparent).state);
          raw_feels = pick_num(raw_feels, id(wx_entity_apparent_temperature).state);
          float raw_dew = pick_num(id(wx_dew_point).state, id(wx_entity_dew_point).state);
          float raw_high = id(wx_today_high).state;
          if (!(raw_high == raw_high) && id(wx_entity_high_temperature_text).has_state()) {
            raw_high = parse_text_float(id(wx_entity_high_temperature_text).state, NA);
          }
          if (!(raw_high == raw_high) && id(wx_entity_forecast_high_temperature_text).has_state()) {
            raw_high = parse_text_float(id(wx_entity_forecast_high_temperature_text).state, NA);
          }
          float raw_low = id(wx_today_low).state;
          if (!(raw_low == raw_low) && id(wx_entity_low_temperature_text).has_state()) {
            raw_low = parse_text_float(id(wx_entity_low_temperature_text).state, NA);
          }
          if (!(raw_low == raw_low) && id(wx_entity_forecast_low_temperature_text).has_state()) {
            raw_low = parse_text_float(id(wx_entity_forecast_low_temperature_text).state, NA);
          }

          float raw_hum = pick_num(id(wx_humidity).state, id(wx_entity_humidity).state);
          float raw_cloud = pick_num(id(wx_clouds).state, id(wx_entity_cloud_coverage).state);
          float raw_uv = id(wx_uv).state;
          float raw_wind = pick_num(id(wx_wind_speed).state, id(wx_entity_wind_speed).state);
          float raw_wind_gust = parse_text_float(id(wx_wind_gust_text).has_state() ? id(wx_wind_gust_text).state : std::string(""), NA);
          if (!(raw_wind_gust == raw_wind_gust) && id(wx_entity_wind_gust_text).has_state()) {
            raw_wind_gust = parse_text_float(id(wx_entity_wind_gust_text).state, NA);
          }
          float raw_wind_dir = pick_num(id(wx_wind_direction).state, id(wx_entity_wind_direction).state);
          raw_wind_dir = pick_num(raw_wind_dir, id(wx_entity_wind_bearing).state);
          float raw_press = pick_num(id(wx_pressure).state, id(wx_entity_pressure).state);
          float raw_vis = pick_num(id(wx_visibility).state, id(wx_entity_visibility).state);
          float raw_rain = parse_text_float(id(wx_rain_intensity_text).has_state() ? id(wx_rain_intensity_text).state : std::string(""), NA);
          if (!(raw_rain == raw_rain) && id(wx_entity_rain_intensity_text).has_state()) {
            raw_rain = parse_text_float(id(wx_entity_rain_intensity_text).state, NA);
          }
          float raw_snow = parse_text_float(id(wx_snow_intensity_text).has_state() ? id(wx_snow_intensity_text).state : std::string(""), NA);
          if (!(raw_snow == raw_snow) && id(wx_entity_snow_intensity_text).has_state()) {
            raw_snow = parse_text_float(id(wx_entity_snow_intensity_text).state, NA);
          }

          float raw_code = NA;
          if (id(wx_weather_code_text).has_state()) {
            raw_code = parse_text_float(id(wx_weather_code_text).state, NA);
          }
          if (!(raw_code == raw_code) && id(wx_entity_weather_code_text).has_state()) {
            raw_code = parse_text_float(id(wx_entity_weather_code_text).state, NA);
          }

          std::string condition = id(wx_condition).has_state() ? id(wx_condition).state : std::string("");
          std::string weather = id(wx_weather).has_state() ? id(wx_weather).state : std::string("");
          std::string entity_state = id(wx_entity_state).has_state() ? id(wx_entity_state).state : std::string("");
          std::string precip_kind = id(wx_precip_kind_text).has_state() ? id(wx_precip_kind_text).state : std::string("");
          if (precip_kind.empty() && id(wx_entity_precip_kind_text).has_state()) precip_kind = id(wx_entity_precip_kind_text).state;

          if (condition.empty()) condition = entity_state;
          if (weather.empty()) weather = condition;

          id(wx_norm_temp_c) = temp_to_c(raw_temp);
          id(wx_norm_feels_c) = temp_to_c(raw_feels);
          id(wx_norm_dew_c) = temp_to_c(raw_dew);
          id(wx_norm_high_c) = temp_to_c(raw_high);
          id(wx_norm_low_c) = temp_to_c(raw_low);
          id(wx_norm_humidity_pct) = raw_hum;
          id(wx_norm_cloud_pct) = raw_cloud;
          id(wx_norm_uv) = raw_uv;
          id(wx_norm_wind_mps) = wind_to_mps(raw_wind);
          id(wx_norm_wind_gust_mps) = wind_to_mps(raw_wind_gust);
          id(wx_norm_wind_dir_deg) = raw_wind_dir;
          id(wx_norm_pressure_hpa) = pressure_to_hpa(raw_press);
          id(wx_norm_visibility_m) = visibility_to_m(raw_vis);
          id(wx_norm_rain_mm_h) = precip_to_mm_h(raw_rain);
          id(wx_norm_snow_mm_h) = precip_to_mm_h(raw_snow);
          id(wx_norm_weather_code) = (raw_code == raw_code) ? (int) raw_code : -1;
          id(wx_norm_condition) = condition.empty() ? "-" : condition;
          id(wx_norm_weather) = weather.empty() ? "-" : weather;
          id(wx_norm_precip_kind) = precip_kind.empty() ? "-" : precip_kind;

          int icon_bucket = 0;  // unknown
          int code = id(wx_norm_weather_code);
          if (code >= 200 && code <= 299) icon_bucket = 4;
          else if (code >= 300 && code <= 599) icon_bucket = 3;
          else if (code >= 600 && code <= 699) icon_bucket = 5;
          else if (code >= 700 && code <= 799) icon_bucket = 6;
          else if (code == 800) icon_bucket = 1;
          else if (code >= 801 && code <= 804) icon_bucket = 2;

          std::string icon_text = lower(id(wx_norm_weather) + std::string(" ") + id(wx_norm_condition) + std::string(" ") + id(wx_norm_precip_kind));
          if (icon_text.find("partly") != std::string::npos) icon_bucket = 8;
          else if (icon_text.find("thunder") != std::string::npos || icon_text.find("storm") != std::string::npos) icon_bucket = 4;
          else if (icon_text.find("snow") != std::string::npos) icon_bucket = 5;
          else if (icon_text.find("rain") != std::string::npos || icon_text.find("drizzle") != std::string::npos || icon_text.find("shower") != std::string::npos) icon_bucket = 3;
          else if (icon_text.find("fog") != std::string::npos || icon_text.find("mist") != std::string::npos || icon_text.find("haze") != std::string::npos || icon_text.find("smoke") != std::string::npos) icon_bucket = 6;
          else if (icon_text.find("wind") != std::string::npos || icon_text.find("breeze") != std::string::npos) icon_bucket = 7;
          else if (icon_text.find("clear") != std::string::npos || icon_text.find("sun") != std::string::npos) icon_bucket = 1;
          else if (icon_text.find("cloud") != std::string::npos) icon_bucket = 2;

          id(wx_icon_bucket) = icon_bucket;

