  - id: climate_commit_targets
    mode: restart
    then:
      - script.execute: climate_resolve_mode
      - script.execute: climate_ui_clamp_targets
      - lambda: |-
          uint32_t now = esphome::millis();
          uint32_t ack_timeout = (uint32_t) atoi("${climate_ack_timeout_ms}");
          if (ack_timeout < 2000U) ack_timeout = 2000U;
          id(climate_commit_seq) += 1;
          id(climate_last_command_ms) = now;
          id(climate_ack_deadline_ms) = now + ack_timeout;
          id(climate_ack_pending) = true;
          id(climate_out_of_sync) = false;
          id(climate_last_commit_result) = "dispatch";
          id(climate_last_requested_single) = (float) id(climate_ui_target_single_f);
          id(climate_last_requested_heat) = (float) id(climate_ui_target_heat_f);
          id(climate_last_requested_cool) = (float) id(climate_ui_target_cool_f);
      - if:
          condition:
            lambda: |-
              std::string mode = id(climate_mode_effective);
              return mode == "auto" || mode == "heat_cool" || mode == "heat-cool";
          then:
            - script.execute: climate_commit_auto_band
          else:
            - script.execute: climate_commit_single_target
      - lambda: |-
          id(climate_last_commit_ms) = esphome::millis();
          id(climate_commit_pending) = false;
          id(climate_ui_dirty) = false;
          if (id(climate_last_commit_result) == "dispatch") {
            id(climate_last_commit_result) = "sent";
          }
      - script.execute: climate_ack_check
      - script.execute: climate_update_labels
      - script.execute: climate_sync_controls

  - id: climate_commit_debounced
    mode: restart
    then:
      - lambda: |-
          id(climate_commit_pending) = true;
      - if:
          condition:
            lambda: |-
              uint32_t now = esphome::millis();
              uint32_t min_gap = (uint32_t) atoi("${climate_hold_repeat_ms}");
              if (min_gap < 120U) min_gap = 120U;
              return (now - id(climate_last_commit_ms)) >= min_gap;
          then:
            - script.execute: climate_commit_targets

  - id: climate_commit_dispatch
    mode: restart
    then:
      - script.execute: climate_commit_targets

  - id: climate_request_adjust
    mode: restart
    parameters:
      zone: int
      delta: int
      immediate: bool
    then:
      - lambda: |-
          char buf[48];
          snprintf(buf, sizeof(buf), "adjust z%d d%d", zone, delta);
          id(climate_last_commit_result) = std::string(buf);
      - if:
          condition:
            lambda: "return zone == 0;"
          then:
            - script.execute:
                id: climate_adjust_single
                delta: !lambda "return delta;"
                immediate: !lambda "return immediate;"
      - if:
          condition:
            lambda: "return zone == 1;"
          then:
            - script.execute:
                id: climate_adjust_heat
                delta: !lambda "return delta;"
                immediate: !lambda "return immediate;"
      - if:
          condition:
            lambda: "return zone == 2;"
          then:
            - script.execute:
                id: climate_adjust_cool
                delta: !lambda "return delta;"
                immediate: !lambda "return immediate;"

  - id: climate_adjust_single
    mode: restart
    parameters:
      delta: int
      immediate: bool
    then:
      - script.execute: climate_resolve_mode
      - lambda: |-
          id(climate_ui_target_single_f) += delta;
          std::string mode = id(climate_mode_effective);
          if (mode == "heat") id(climate_ui_target_heat_f) = id(climate_ui_target_single_f);
          if (mode == "cool") id(climate_ui_target_cool_f) = id(climate_ui_target_single_f);
          if (mode == "auto" || mode == "heat_cool") {
            id(climate_ui_target_heat_f) += delta;
            id(climate_ui_target_cool_f) += delta;
          }
          id(climate_ui_dirty) = true;
      - script.execute: climate_ui_clamp_targets
      - script.execute: climate_update_labels
      - script.execute: climate_sync_controls
      - if:
          condition:
            lambda: "return immediate;"
          then:
            - script.execute: climate_commit_dispatch
