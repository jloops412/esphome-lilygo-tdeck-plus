          text: !lambda |-
            char buf[128];
            float sats = id(gps_satellites).state;
            float indoor = id(sensi_temperature).state;
            bool has_indoor = indoor == indoor;
            bool gps_alive = (esphome::millis() - id(gps_last_update_ms)) < 15000U;
            bool app_metric = id(app_units_mode) == 1;
            bool native_metric = false;
            if (id(sensi_climate_temperature_unit).has_state()) {
              std::string tu = id(sensi_climate_temperature_unit).state;
              native_metric = (tu.find("C") != std::string::npos || tu.find("c") != std::string::npos);
            }
            if (has_indoor) {
              if (app_metric && !native_metric) indoor = (indoor - 32.0f) * (5.0f / 9.0f);
              else if (!app_metric && native_metric) indoor = (indoor * (9.0f / 5.0f)) + 32.0f;
            }
            const char *unit = app_metric ? "C" : "F";
            if (!gps_alive) {
              if (has_indoor) {
                snprintf(buf, sizeof(buf), "Batt %.0f%%  WiFi %.0fdBm  In %.1f%s  GPS NO",
                         id(battery_percent).state, id(wifi_signal_tdeck).state, indoor, unit);
              } else {
                snprintf(buf, sizeof(buf), "Batt %.0f%%  WiFi %.0fdBm  GPS NO",
                         id(battery_percent).state, id(wifi_signal_tdeck).state);
              }
            } else if (sats > 0.0f) {
              if (has_indoor) {
                snprintf(buf, sizeof(buf), "Batt %.0f%%  WiFi %.0fdBm  In %.1f%s  GPS %.0f",
                         id(battery_percent).state, id(wifi_signal_tdeck).state, indoor, unit, sats);
              } else {
