  - id: camera_snapshot_trigger_slot
    mode: restart
    parameters:
      slot: int
    then:
      - if:
          condition:
            lambda: |-
              if (atoi("${camera_slot_count}") < 1) return false;
              if (slot < 0 || slot > 1) return false;
              std::string e = slot == 0 ? std::string("${camera_slot_1_entity}") : std::string("${camera_slot_2_entity}");
              return !e.empty() && e.find("replace_me") == std::string::npos;
          then:
            - homeassistant.action:
                action: camera.snapshot
                data:
                  entity_id: !lambda |-
                    return slot == 0 ? std::string("${camera_slot_1_entity}") : std::string("${camera_slot_2_entity}");
                  filename: !lambda |-
                    if (slot == 0) return std::string("${camera_snapshot_dir}/cam1.jpg");
                    return std::string("${camera_snapshot_dir}/cam2.jpg");
          else:
            - lambda: |-
                id(camera_last_snapshot_result) = "camera slot not configured";

  - id: camera_snapshot_trigger_all
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              std::string en = "${camera_snapshot_enable}";
              for (char &c : en) if (c >= 'A' && c <= 'Z') c = (char) (c - 'A' + 'a');
              return !(en == "false" || en == "0" || en == "off" || en == "no");
          then:
            - script.execute:
                id: camera_snapshot_trigger_slot
                slot: 0
            - if:
                condition:
                  lambda: "return atoi(\"${camera_slot_count}\") >= 2;"
                then:
                  - script.execute:
                      id: camera_snapshot_trigger_slot
                      slot: 1

  - id: camera_images_pull
    mode: restart
    then:
