            return std::string("Mode: ") + mode;
      - lvgl.label.update:
          id: climate_action_chip_lbl
          text: !lambda |-
            std::string action = id(sensi_climate_hvac_action).has_state() ? id(sensi_climate_hvac_action).state : std::string("-");
            return std::string("Act: ") + action;
      - lvgl.label.update:
