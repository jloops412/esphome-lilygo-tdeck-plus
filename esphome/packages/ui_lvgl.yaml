      - script.execute: lvgl_sync_lights_controls
      - script.execute: climate_sync_controls

interval:
  - interval: 1s
    then:
      - lambda: |-
          uint32_t now = esphome::millis();
          uint32_t idle_ms = now - id(last_activity_ms);
          if (id(screensaver_enabled) && !id(screensaver_active)) {
            if (idle_ms >= (uint32_t) id(screensaver_timeout_s) * 1000UL) {
              id(sleep_display).execute();
            }
          }

  - interval: 2s
    then:
      - if:
          condition:
            lambda: "return !id(screensaver_active);"
          then:
            - script.execute: lvgl_update_labels
            - script.execute: climate_update_labels

  - interval: 220ms
    then:
      - if:
          condition:
            lambda: |-
              if (!id(climate_commit_pending)) return false;
              uint32_t now = esphome::millis();
              uint32_t min_gap = (uint32_t) atoi("${climate_hold_repeat_ms}");
              if (min_gap < 120U) min_gap = 120U;
              return (now - id(climate_last_commit_ms)) >= min_gap;
          then:
            - script.execute: climate_commit_targets

lvgl:
  displays:
    - tft
  touchscreens:
    - tdeck_touch
  keypads:
    - id: nav_keypad
      group: nav_group
      prev: tb_left
      next: tb_right
      up: tb_up
      down: tb_down
      enter: tb_click
      long_press_time: 300ms
      long_press_repeat_time: 65535ms

  on_boot:
    then:
      - lambda: |-
          if (id(touch_cal_suggest_x_max) <= id(touch_cal_suggest_x_min) ||
              id(touch_cal_suggest_y_max) <= id(touch_cal_suggest_y_min)) {
            id(touch_cal_suggest_x_min) = atoi("${touch_x_min}");
            id(touch_cal_suggest_x_max) = atoi("${touch_x_max}");
            id(touch_cal_suggest_y_min) = atoi("${touch_y_min}");
            id(touch_cal_suggest_y_max) = atoi("${touch_y_max}");
          }
      - script.execute: touch_cal_apply_stored
      - script.execute: apply_theme
      - script.execute: theme_sync_editor_from_token
      - script.execute: resolve_selected_light_target
      - script.execute: climate_ui_seed_from_ha
      - script.execute: app_units_init_from_ha
      - script.execute: weather_update_model
      - script.execute: weather_update_icon
      - script.execute: settings_section_show
      - script.execute: diagnostics_update_labels
      - lvgl.widget.focus: home_lights_btn
      - script.execute: lvgl_update_dynamic

