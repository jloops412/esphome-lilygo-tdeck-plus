            } else {
              if (has_indoor) {
                snprintf(buf, sizeof(buf), "Batt %.0f%%  WiFi %.0fdBm  In %.1f%s  GPS ...",
                         id(battery_percent).state, id(wifi_signal_tdeck).state, indoor, unit);
              } else {
                snprintf(buf, sizeof(buf), "Batt %.0f%%  WiFi %.0fdBm  GPS ...",
