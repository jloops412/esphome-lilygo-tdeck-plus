          text_color: !lambda "return lv_color_hex((uint32_t) id(theme_token_text_primary));"
      - lvgl.style.update:
          id: lv_style_card
          bg_color: !lambda "return lv_color_hex((uint32_t) id(theme_token_surface));"
          border_color: !lambda "return lv_color_hex((uint32_t) id(theme_token_action_soft));"
          text_color: !lambda "return lv_color_hex((uint32_t) id(theme_token_text_primary));"
      - lvgl.style.update:
          id: lv_style_btn
          bg_color: !lambda "return lv_color_hex((uint32_t) id(theme_token_action));"
          border_color: !lambda "return lv_color_hex((uint32_t) id(theme_token_action_soft));"
          text_color: !lambda "return lv_color_hex((uint32_t) id(theme_token_text_primary));"
      - lvgl.style.update:
          id: lv_style_btn_soft
          bg_color: !lambda "return lv_color_hex((uint32_t) id(theme_token_surface_alt));"
          border_color: !lambda "return lv_color_hex((uint32_t) id(theme_token_action_soft));"
          text_color: !lambda "return lv_color_hex((uint32_t) id(theme_token_text_primary));"
      - lvgl.style.update:
          id: lv_style_btn_ok
