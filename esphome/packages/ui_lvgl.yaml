            for (char &c : s) {
              if (c >= 'A' && c <= 'Z') c = (char) (c - 'A' + 'a');
            }
            return s;
          };

          int mode = 0;
          std::string source = "fallback-imperial";

          if (id(ha_unit_system).has_state() && !id(ha_unit_system).state.empty()) {
            std::string s = lower(id(ha_unit_system).state);
            if (s.find("metric") != std::string::npos || s.find("si") != std::string::npos) {
