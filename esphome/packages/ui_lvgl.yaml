            0x6A3A90, 0x8A4DB8, 0xA961D4, 0xC078E8, 0xD79AF2, 0xE8C1F8, 0xF3DDFD, 0xFAEDFF,
            0x3A2116, 0x5A3322, 0x7D452C, 0xA65B36, 0xCC7343, 0xE88A54, 0xF3A56F, 0xF7C08F
          };
          const int swatch_count = sizeof(swatches) / sizeof(swatches[0]);
          int color = id(theme_token_screen_bg);
          switch (id(theme_token_index)) {
            case 0: color = id(theme_token_screen_bg); break;
            case 1: color = id(theme_token_surface); break;
            case 2: color = id(theme_token_surface_alt); break;
            case 3: color = id(theme_token_action); break;
            case 4: color = id(theme_token_action_soft); break;
            case 5: color = id(theme_token_text_primary); break;
            case 6: color = id(theme_token_text_dim); break;
            case 7: color = id(theme_token_ok); break;
            default: color = id(theme_token_warn); break;
          }
          id(theme_edit_color) = color;
          id(theme_edit_r) = (color >> 16) & 0xFF;
          id(theme_edit_g) = (color >> 8) & 0xFF;
          id(theme_edit_b) = color & 0xFF;
          int best_idx = 0;
          int best_score = 1000000;
          int tr = id(theme_edit_r);
          int tg = id(theme_edit_g);
          int tb = id(theme_edit_b);
          for (int i = 0; i < swatch_count; i++) {
            int sr = (swatches[i] >> 16) & 0xFF;
            int sg = (swatches[i] >> 8) & 0xFF;
