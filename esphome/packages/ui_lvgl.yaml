select:
  - platform: template
    id: lvgl_units_mode_select
    name: "${friendly_name} UI Units Mode"
    options:
      - Imperial
      - Metric
    lambda: |-
      return id(app_units_mode) == 1 ? std::string("Metric") : std::string("Imperial");
    set_action:
      - if:
          condition:
            lambda: "return x == \"Metric\";"
          then:
            - script.execute: app_units_set_metric
          else:
            - script.execute: app_units_set_imperial

  - platform: template
    id: lvgl_theme_icon_mode_select
    name: "${friendly_name} UI Icon Color Mode"
    options:
      - Text
      - Accent
    lambda: |-
      return id(theme_icon_mode) == 0 ? std::string("Text") : std::string("Accent");
    set_action:
      - lambda: |-
          id(theme_icon_mode) = (x == "Accent") ? 1 : 0;
      - script.execute: apply_theme_icon
      - script.execute: lvgl_update_labels

button:
  - platform: template
    id: lvgl_camera_refresh_button
    name: "${friendly_name} UI Camera Refresh"
    on_press:
      - script.execute: camera_refresh_all

  - platform: template
    id: lvgl_climate_retry_sync_button
