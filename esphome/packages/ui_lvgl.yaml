  - id: climate_update_labels
    mode: restart
    then:
      - lambda: |-
          uint32_t since_commit = esphome::millis() - id(climate_last_commit_ms);
          if (!id(climate_ui_dirty) && !id(climate_commit_pending) && since_commit > 1500U) {
            bool app_metric = id(app_units_mode) == 1;
            bool native_metric = false;
            if (id(sensi_climate_temperature_unit).has_state()) {
              std::string tu = id(sensi_climate_temperature_unit).state;
              native_metric = (tu.find("C") != std::string::npos || tu.find("c") != std::string::npos);
            }
            auto native_to_app = [&](float v) -> int {
              if (!(v == v)) return 0;
              if (app_metric && !native_metric) v = (v - 32.0f) * (5.0f / 9.0f);
              else if (!app_metric && native_metric) v = (v * (9.0f / 5.0f)) + 32.0f;
              return (int) (v + (v >= 0.0f ? 0.5f : -0.5f));
            };
            if (id(sensi_auto_heat_temp).state == id(sensi_auto_heat_temp).state) {
              id(climate_ui_target_heat_f) = native_to_app(id(sensi_auto_heat_temp).state);
            }
            if (id(sensi_auto_cool_temp).state == id(sensi_auto_cool_temp).state) {
              id(climate_ui_target_cool_f) = native_to_app(id(sensi_auto_cool_temp).state);
            }
            std::string mode = id(sensi_climate_state).has_state() ? id(sensi_climate_state).state : std::string("");
            if (mode == "heat") id(climate_ui_target_single_f) = id(climate_ui_target_heat_f);
            else if (mode == "cool") id(climate_ui_target_single_f) = id(climate_ui_target_cool_f);
            else if (mode == "auto" || mode == "heat_cool" || mode == "heat-cool") {
              id(climate_ui_target_single_f) = (id(climate_ui_target_heat_f) + id(climate_ui_target_cool_f)) / 2;
            }
          }
      - script.execute: climate_ui_clamp_targets
      - lvgl.label.update:
