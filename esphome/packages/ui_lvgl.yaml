    on_press:
      - script.execute: climate_force_resync

interval:
  - interval: 1s
    then:
      - script.execute: screensaver_tick
      - script.execute: climate_ack_check

  - interval: 2s
    then:
      - if:
          condition:
            lambda: "return !id(screensaver_active);"
          then:
            - script.execute: lvgl_update_labels
            - script.execute: climate_update_labels
            - script.execute: home_weather_icon_sync

  - interval: 15s
    then:
      - if:
          condition:
            lambda: "return !id(screensaver_active);"
          then:
            - script.execute: weather_update_model
            - script.execute: weather_update_icon
            - script.execute: weather_update_labels

  - interval: 5s
    then:
      - if:
          condition:
            lambda: |-
              if (id(screensaver_active)) return false;
              if (atoi("${camera_slot_count}") <= 0) return false;
              if (!id(camera_auto_refresh_enabled)) return false;
              uint32_t interval_s = (uint32_t) atoi("${camera_refresh_interval_s}");
              if (interval_s < 15U) interval_s = 15U;
              uint32_t now = esphome::millis();
              return (now - id(camera_last_refresh_ms)) >= (interval_s * 1000UL);
          then:
            - script.execute: camera_refresh_all

  - interval: 220ms
    then:
      - if:
          condition:
            lambda: |-
              if (!id(climate_commit_pending)) return false;
              uint32_t now = esphome::millis();
              uint32_t min_gap = (uint32_t) atoi("${climate_hold_repeat_ms}");
              if (min_gap < 120U) min_gap = 120U;
              return (now - id(climate_last_commit_ms)) >= min_gap;
          then:
            - script.execute: climate_commit_targets

