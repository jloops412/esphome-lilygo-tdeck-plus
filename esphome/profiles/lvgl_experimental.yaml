substitutions:
  name: lilygo-tdeck-plus
  friendly_name: "LilyGO T-Deck Plus"
  gps_rx_pin: "44"
  gps_tx_pin: "43"
  gps_baud_rate: "9600"
  touch_x_min: "0"
  touch_x_max: "238"
  touch_y_min: "16"
  touch_y_max: "260"
  climate_temp_min_f: "50"
  climate_temp_max_f: "90"
  climate_auto_band_min_delta_f: "2"
  climate_hold_repeat_ms: "180"
  climate_ack_timeout_ms: "12000"
