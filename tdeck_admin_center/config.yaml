name: T-Deck Admin Center
version: "0.23.0"
slug: tdeck_admin_center
description: Discover Home Assistant entities and generate T-Deck ESPHome install YAML/overrides.
url: "https://github.com/jloops412/esphome-lilygo-tdeck-plus"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:tune-variant
panel_title: T-Deck Admin
hassio_api: true
homeassistant_api: true
auth_api: true
map:
  - config:rw
options:
  managed_root: /config/esphome/tdeck
  backup_keep_count: 30
schema:
  managed_root: str
  backup_keep_count: int(5,500)
